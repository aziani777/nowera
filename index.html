/* ── KANBAN VIEW (workspace) ── */
const KANBAN_COLS=[
  {id:'todo',    label:'To Do',     labelFr:'À faire',   filter:t=>!t.done&&(!t.priority||t.priority==='low')},
  {id:'medium',  label:'In Progress',labelFr:'En cours',  filter:t=>!t.done&&t.priority==='medium'},
  {id:'high',    label:'Urgent',    labelFr:'Urgent',    filter:t=>!t.done&&t.priority==='high'},
  {id:'done',    label:'Done',      labelFr:'Terminé',   filter:t=>t.done},
];

function buildKanbanView(sec){
  const allTodos=S.todos.filter(t=>t.section===sec);
  const info=SECS[sec]||{color:'var(--accent)'};

  let h=`<div class="kanban-columns">`;
  KANBAN_COLS.forEach(col=>{
    const colLabel=S.lang==='fr'?col.labelFr:col.label;
    let items=allTodos.filter(col.filter);
    const count=items.length;
    h+=`<div class="kanban-col" data-kcol="${col.id}">
      <div class="kanban-col-head">
        <span>${colLabel}</span>
        <span class="count-badge">${count}</span>
      </div>`;
    items.forEach(t=>{
      const ov=isOv(t.due,t.done);
      const lc=getLabelColor(t.label);
      const pri=t.priority||'low';
      h+=`<div class="kanban-card pri-${pri}" data-id="${t.id}" draggable="true" data-kcol="${col.id}">
        ${lc?`<div style="width:100%;height:3px;border-radius:2px;background:${lc};margin-bottom:7px;"></div>`:''}
        <div class="kanban-card-title">${esc(t.text)}</div>
        <div class="kanban-card-meta">
          ${t.due?`<span class="todo-date${ov?' ov':''}" style="font-size:10px;">${fmtDate(t.due)}</span>`:''}
          ${t.source==='gmail'?`<span style="font-size:9px;font-weight:700;padding:0 4px;border-radius:3px;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;">Gmail</span>`:''}
          ${t.recur?`<span class="recur-badge" style="font-size:9px;">↻</span>`:''}
          ${t.subtasks?.length?`<span style="font-size:10px;color:var(--text3);">◎ ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:''}
        </div>
      </div>`;
    });
    // Add card button (only for non-done cols)
    if(col.id!=='done'){
      h+=`<div class="kanban-add-col" data-kadd="${col.id}" data-sec="${sec}">+ Add card</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function kanbanColToPriority(colId){
  if(colId==='high') return 'high';
  if(colId==='medium') return 'medium';
  return 'low';
}

function bindKanbanEvents(ca,sec){
  // click to edit
  ca.querySelectorAll('.kanban-card[data-id]').forEach(card=>{
    card.addEventListener('click',()=>openEditModal(card.dataset.id));
    card.addEventListener('contextmenu',e=>{e.preventDefault();showCtx({clientX:e.clientX,clientY:e.clientY},card.dataset.id);});
  });

  // drag between kanban cols to change priority/done
  let dragKanbanId=null;
  ca.querySelectorAll('.kanban-card[data-id]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragKanbanId=card.dataset.id;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>card.style.opacity='.35',0);
    });
    card.addEventListener('dragend',()=>{card.style.opacity='';dragKanbanId=null;ca.querySelectorAll('.kanban-col').forEach(c=>c.style.outline='');});
  });
  ca.querySelectorAll('.kanban-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.style.outline='2px dashed var(--accent)';col.style.borderRadius='12px';});
    col.addEventListener('dragleave',()=>{col.style.outline='';});
    col.addEventListener('drop',e=>{
      e.preventDefault(); col.style.outline='';
      if(!dragKanbanId) return;
      const targetCol=col.dataset.kcol;
      const todo=S.todos.find(t=>t.id===dragKanbanId);
      if(!todo) return;
      if(targetCol==='done'){ todo.done=true; }
      else { todo.done=false; todo.priority=kanbanColToPriority(targetCol); }
      save(); render();
    });
  });

  // quick add card
  ca.querySelectorAll('.kanban-add-col[data-kadd]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pri=kanbanColToPriority(btn.dataset.kadd);
      S.inlineOpen=sec;
      if(!S.inlineState[sec]) S.inlineState[sec]={pri,date:todayStr(),text:''};
      S.inlineState[sec].pri=pri;
      // Switch to list view to use inline add
      S.viewWs='list'; render();
      setTimeout(()=>{const i=document.getElementById('ii_'+sec);if(i)i.focus();},50);
    });
  });
}

function buildSection(sec){
  const info=SECS[sec]||{label:sec,tag:'tag-pro',bar:'accent-bar-pro',color:'var(--accent)',soft:'var(--accent-soft)'};
  if(!info) return '';
  let todos=S.todos.filter(t=>t.section===sec);
  if(S.filter==='active') todos=todos.filter(t=>!t.done);
  if(S.filter==='done')   todos=todos.filter(t=>t.done);
  const activeN=S.todos.filter(t=>t.section===sec&&!t.done).length;

  let h=`<div class="section-block ${info.bar}" data-sec="${sec}">
    <div class="section-head">
      <span class="tag ${info.tag}"><span class="section-label">${info.label}</span></span>
      <span class="count-badge">${activeN}</span>
    </div><div class="todo-list">`;

  if(!todos.length) h+=`<div class="empty-state">${t('noTasks')}</div>`;

  todos.forEach(t=>{
    const ov=isOv(t.due,t.done);
    const pri=t.priority||'medium';
    const lc=getLabelColor(t.label);
    const doneSubtasks=t.subtasks.filter(s=>s.done).length;
    const totalSubtasks=t.subtasks.length;
    const pct=totalSubtasks?Math.round(doneSubtasks/totalSubtasks*100):0;

    h+=`<div class="todo-item pri-${pri}${t.done?' done':''}" data-id="${t.id}" draggable="true" data-sec="${sec}">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="todo-body">
        <div style="display:flex;align-items:center;gap:6px;">
          ${lc?`<span class="clabel" style="background:${lc}"></span>`:''}
          <div class="todo-text">${esc(t.text)}</div>
        </div>
        ${t.note?`<div class="todo-note-preview">${esc(t.note.split('\n')[0])}</div>`:''}
        ${totalSubtasks?`<div class="subtasks-wrap">
          <div class="subtask-progress"><div class="subtask-progress-bar" style="width:${pct}%"></div></div>
          <div style="font-size:11px;color:var(--text3)">${doneSubtasks}/${totalSubtasks} sub-tasks</div>
        </div>`:''}
        <div class="todo-meta">
          ${t.due?`<span class="todo-date${ov?' ov':''}">${fmtDate(t.due)}${ov?' · overdue':''}</span>`:''}
          <span class="pri-badge pri-badge-${pri}">${cap(pri)}</span>
          ${t.recur?`<span class="recur-badge">↻ ${cap(t.recur)}</span>`:''}
          ${t.source==='gmail'?`<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;">📧 Gmail</span>`:''}
          ${t.link?`<a class="todo-link" href="${esc(t.link)}" target="_blank" onclick="event.stopPropagation()">🔗</a>`:''}
          ${t.done?`<span style="font-size:11px;color:var(--success);font-weight:600;">✓ Done</span>`:''}
        </div>
      </div>
      <button class="todo-del-btn" data-id="${t.id}" title="Delete task" onclick="event.stopPropagation()">×</button>
      <div class="swipe-hint swipe-hint-right">✓</div>
      <div class="swipe-hint swipe-hint-left">🗑</div>
    </div>`;
  });

  // inline add
  const ist=S.inlineState[sec]||{};
  if(S.inlineOpen===sec){
    const dp=ist.pri||'medium';
    const dd=ist.date||todayStr();
    const dr=ist.recur||'';
    h+=`<div class="inline-input-wrap">
      <input id="ii_${sec}" class="inline-text-input" placeholder="Task name… (Enter to save, Esc to cancel)" value="${esc(ist.text||'')}" />
      <div class="inline-controls">
        <button class="pri-box low${dp==='low'?' sel':''}" data-pri="low" data-sec="${sec}">Low</button>
        <button class="pri-box medium${dp==='medium'?' sel':''}" data-pri="medium" data-sec="${sec}">Medium</button>
        <button class="pri-box high${dp==='high'?' sel':''}" data-pri="high" data-sec="${sec}">High</button>
        <button class="inline-date-btn${dd?' has-date':''}" id="idb_${sec}">${dd?fmtDate(dd):t('pickDate')}</button>
        <select id="irec_${sec}" class="inline-select" style="background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;padding:5px 8px;font-family:inherit;font-size:12px;color:var(--text2);outline:none;">
          <option value="">${t('noRepeat')}</option>
          <option value="weekly"${dr==='weekly'?' selected':''}>${t('weekly')}</option>
          <option value="monthly"${dr==='monthly'?' selected':''}>${t('monthly')}</option>
        </select>
        <button id="isave_${sec}" class="inline-save">${t('save')}</button>
        <button id="icancel_${sec}" class="inline-cancel">×</button>
      </div>
    </div>`;
  } else {
    h+=`<div class="inline-add" data-sec="${sec}"><div class="add-plus">+</div><span class="add-prompt">${t('addTask')}</span></div>`;
  }
  h+=`</div></div>`;
  return h;
}

function bindTodoEvents(ca,secs){
  // × delete buttons
  ca.querySelectorAll('.todo-del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.id;
      const t=S.todos.find(x=>x.id===id);
      if(!t)return;
      pendingDeleteId=id;
      document.getElementById('confirmMsg').textContent=`"${t.text.slice(0,60)}"`;
      document.getElementById('confirmOverlay').classList.add('open');
    });
  });

  ca.querySelectorAll('.filter-btn[data-f]').forEach(b=>{b.addEventListener('click',()=>{S.filter=b.dataset.f;render();});});

  let dragId=null,didDrag=false;
  ca.querySelectorAll('.todo-item[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;didDrag=false;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragId);setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('drag',()=>{didDrag=true;});
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');
      ca.querySelectorAll('.todo-item').forEach(x=>{x.classList.remove('drag-over-top','drag-over-bot');});
      ca.querySelectorAll('.section-block').forEach(x=>x.classList.remove('drop-target'));
      dragId=null;
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragId||el.dataset.id===dragId)return;
      const rect=el.getBoundingClientRect();
      ca.querySelectorAll('.todo-item').forEach(x=>{x.classList.remove('drag-over-top','drag-over-bot');});
      el.classList.add(e.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bot');
    });
    el.addEventListener('dragleave',()=>{el.classList.remove('drag-over-top','drag-over-bot');});
    el.addEventListener('drop',e=>{
      e.preventDefault();
      el.classList.remove('drag-over-top','drag-over-bot');
      if(!dragId||el.dataset.id===dragId)return;
      const fi=S.todos.findIndex(x=>x.id===dragId);
      if(fi<0)return;
      const targetSec=el.dataset.sec;
      const fromSec=S.todos[fi].section;
      // cross-space: just move to new section, append at end
      if(fromSec!==targetSec){
        S.todos[fi].section=targetSec;
        save();render();return;
      }
      // same section: reorder
      let ti=S.todos.findIndex(x=>x.id===el.dataset.id);
      if(ti<0)return;
      const rect=el.getBoundingClientRect();
      const after=e.clientY>=rect.top+rect.height/2;
      const[moved]=S.todos.splice(fi,1);
      ti=S.todos.findIndex(x=>x.id===el.dataset.id);
      S.todos.splice(after?ti+1:ti,0,moved);
      save();render();
    });

    // swipe on touch
    let tx0=null,ty0=null,swiping=false;
    el.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;swiping=false;},{passive:true});
    el.addEventListener('touchmove',e=>{
      if(tx0===null)return;
      const dx=e.touches[0].clientX-tx0,dy=e.touches[0].clientY-ty0;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){
        swiping=true;
        el.classList.toggle('swipe-right',dx>60);
        el.classList.toggle('swipe-left',dx<-60);
      }
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(swiping){
        const dx=e.changedTouches[0].clientX-tx0;
        if(dx>80) toggleDone(el.dataset.id);
        else if(dx<-80) confirmDelete(el.dataset.id);
        el.classList.remove('swipe-right','swipe-left');
      }
      tx0=null;ty0=null;swiping=false;
    });

    // click → edit
    el.addEventListener('click',e=>{
      if(didDrag){didDrag=false;return;}
      if(e.target.closest('.todo-link'))return;
      if(el.dataset.lp==='1'){el.dataset.lp='';return;}
      openEditModal(el.dataset.id);
    });
    // right-click / long press
    el.addEventListener('contextmenu',e=>{e.preventDefault();showCtx({clientX:e.clientX,clientY:e.clientY},el.dataset.id);});
    addLongPress(el,coords=>{el.dataset.lp='1';showCtx(coords,el.dataset.id);});
  });

  // inline add
  ca.querySelectorAll('.inline-add').forEach(el=>{
    el.addEventListener('click',()=>{
      S.inlineOpen=el.dataset.sec;
      if(!S.inlineState[el.dataset.sec]) S.inlineState[el.dataset.sec]={pri:'medium',date:todayStr(),text:''};
      render();
      setTimeout(()=>{const i=document.getElementById('ii_'+el.dataset.sec);if(i)i.focus();},30);
    });
  });
  secs.forEach(sec=>{
    const inp=document.getElementById('ii_'+sec);if(!inp)return;
    inp.addEventListener('input',()=>{S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].text=inp.value;});
    ca.querySelectorAll(`.pri-box[data-sec="${sec}"]`).forEach(btn=>{
      btn.addEventListener('click',()=>{
        S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].pri=btn.dataset.pri;
        ca.querySelectorAll(`.pri-box[data-sec="${sec}"]`).forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
      });
    });
    document.getElementById('idb_'+sec)?.addEventListener('click',e=>{
      e.stopPropagation();
      showMiniCal(e.currentTarget,S.inlineState[sec]?.date||todayStr(),picked=>{
        S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].date=picked;
        const btn=document.getElementById('idb_'+sec);
        if(btn){btn.textContent=fmtDate(picked);btn.classList.add('has-date');}
      });
    });
    const doSave=()=>{
      const text=inp.value.trim();
      if(text){
        const st=S.inlineState[sec]||{};
        const recurVal=document.getElementById('irec_'+sec)?.value||'';
        S.todos.push({id:uid(),text,section:sec,priority:st.pri||'medium',due:st.date||null,done:false,note:'',link:'',label:'',recur:recurVal,subtasks:[],created:new Date().toISOString()});
        save();
      }
      S.inlineOpen=null;delete S.inlineState[sec];render();
    };
    const doCancel=()=>{S.inlineOpen=null;delete S.inlineState[sec];render();};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')doCancel();});
    document.getElementById('isave_'+sec)?.addEventListener('click',doSave);
    document.getElementById('icancel_'+sec)?.addEventListener('click',doCancel);
  });

  // Section-block drop targets (for moving to empty sections or header drop)
  ca.querySelectorAll('.section-block[data-sec]').forEach(block=>{
    block.addEventListener('dragover',e=>{
      if(!dragId)return;
      e.preventDefault();
      ca.querySelectorAll('.section-block').forEach(b=>b.classList.remove('drop-target'));
      block.classList.add('drop-target');
    });
    block.addEventListener('dragleave',e=>{
      if(!e.relatedTarget||!block.contains(e.relatedTarget)) block.classList.remove('drop-target');
    });
    block.addEventListener('drop',e=>{
      e.preventDefault();
      block.classList.remove('drop-target');
      if(!dragId)return;
      const targetSec=block.dataset.sec;
      const fi=S.todos.findIndex(x=>x.id===dragId);
      if(fi<0)return;
      if(S.todos[fi].section===targetSec)return; // same sec handled by item drop
      S.todos[fi].section=targetSec;
      toast(`→ Moved to ${SECS[targetSec]?.label||targetSec}`);
      save();render();
    });
  });
}

function toggleDone(id){const t=S.todos.find(x=>x.id===id);if(t){t.done=!t.done;save();render();}}

/* ══════════════════════════════════════
   WEEKLY VIEW
══════════════════════════════════════ */
function renderWeek(ca){
  ca.classList.add('week-view');
  const today=new Date();
  const dow=(today.getDay()+6)%7;
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-dow+S.weekOffset*7);

  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  });

  const ws=fmtDate(days[0]),we=fmtDate(days[6]);
  let h=`<div class="week-header">
    <div class="week-title">${ws} — ${we}</div>
    <div style="display:flex;gap:6px;">
      <button class="btn-icon" id="weekPrev">‹</button>
      <button class="btn-icon" id="weekToday" style="padding:0 10px;width:auto;font-size:12px;">Today</button>
      <button class="btn-icon" id="weekNext">›</button>
    </div>
  </div>
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
  <div class="week-grid" style="min-width:700px;">`;

  days.forEach((ds,i)=>{
    const isToday=ds===todayStr();
    const dayTodos=S.todos.filter(t=>t.due===ds);
    const dayMtgs=S.meetings.filter(m=>m.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
    const d=new Date(ds+' 00:00');
    h+=`<div class="week-col">
      <div class="week-col-head${isToday?' today-col':''}">
        <div class="week-col-day">${DAYS[i].slice(0,3)}</div>
        <div class="week-col-date">${parseInt(ds.split('-')[2])} ${SMON[d.getMonth()]}</div>
      </div>`;
    if(!dayTodos.length&&!dayMtgs.length){
      h+=`<div class="week-empty">—</div>`;
    }
    dayMtgs.forEach(m=>{
      const info=SECS[m.section]||{dot:'',color:'var(--text3)'};
      h+=`<div class="week-mtg"><div class="week-mtg-time">${m.time||'--:--'}</div><div style="flex:1;font-size:12px;line-height:1.3;">${esc(m.title)}</div></div>`;
    });
    dayTodos.forEach(t=>{
      const info=SECS[t.section]||{color:'var(--text3)'};
      const lc=getLabelColor(t.label);
      h+=`<div class="week-item${t.done?' done-item':''}" data-id="${t.id}">
        <span class="week-item-dot" style="background:${lc||info.color}"></span>
        <span style="flex:1;font-size:12px;line-height:1.35;">${esc(t.text)}</span>
        <span class="pri-badge pri-badge-${t.priority||'medium'}" style="font-size:9px;padding:1px 4px;">${cap(t.priority||'medium')[0]}</span>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  ca.innerHTML=h;
  document.getElementById('weekPrev').addEventListener('click',()=>{S.weekOffset--;render();});
  document.getElementById('weekNext').addEventListener('click',()=>{S.weekOffset++;render();});
  document.getElementById('weekToday').addEventListener('click',()=>{S.weekOffset=0;render();});
  ca.querySelectorAll('.week-item[data-id]').forEach(el=>{
    el.addEventListener('click',()=>openEditModal(el.dataset.id));
    el.addEventListener('contextmenu',e=>{e.preventDefault();showCtx({clientX:e.clientX,clientY:e.clientY},el.dataset.id);});
    addLongPress(el,coords=>{el.dataset.lp='1';showCtx(coords,el.dataset.id);});
  });
}

/* ══════════════════════════════════════
   CONTEXT MENU + LONG PRESS
══════════════════════════════════════ */
function addLongPress(el,cb){
  let timer=null,moved=false;
  const start=e=>{moved=false;timer=setTimeout(()=>{if(!moved){const c=e.touches?{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}:{clientX:e.clientX,clientY:e.clientY};cb(c);}},500);};
  const cancel=()=>{clearTimeout(timer);timer=null;};
  const move=()=>{moved=true;clearTimeout(timer);};
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',move,{passive:true});
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mousemove',move);
}

let activeCtxId=null;
function showCtx(coords,id){
  closeCtx();activeCtxId=id;
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const menu=document.createElement('div');
  menu.className='ctx-menu';menu.id='ctxMenu';
  menu.innerHTML=`
    <div class="ctx-item success" id="ctx-done">✓ ${t.done?'Mark active':'Mark done'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-edit">✎ Edit task</div>
    <div class="ctx-item ai" id="ctx-ai">✦ AI breakdown</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="ctx-del">✕ Delete</div>`;
  document.body.appendChild(menu);
  const vw=window.innerWidth,vh=window.innerHeight;
  let x=coords.clientX,y=coords.clientY;
  if(x+210>vw)x=vw-216;if(y+160>vh)y=vh-166;if(x<8)x=8;if(y<8)y=8;
  menu.style.left=x+'px';menu.style.top=y+'px';
  if(navigator.vibrate)navigator.vibrate(40);
  document.getElementById('ctx-done').addEventListener('click',()=>{toggleDone(id);closeCtx();});
  document.getElementById('ctx-edit').addEventListener('click',()=>{openEditModal(id);closeCtx();});
  document.getElementById('ctx-ai').addEventListener('click',()=>{openEditModal(id,'ai');closeCtx();});
  document.getElementById('ctx-del').addEventListener('click',()=>{closeCtx();confirmDelete(id);});
}
function closeCtx(){const m=document.getElementById('ctxMenu');if(m)m.remove();activeCtxId=null;}
document.addEventListener('click',closeCtx);
document.addEventListener('touchstart',e=>{if(!e.target.closest('#ctxMenu'))closeCtx();},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCtx();closeMiniCal();}});

/* ══════════════════════════════════════

let editingId=null;
function openEditModal(id,mode){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('editText').value=t.text;
  document.getElementById('editNote').value=t.note||'';
  document.getElementById('editLink').value=t.link||'';
  document.getElementById('editDue').value=t.due||'';
  document.getElementById('editRecur').value=t.recur||'';
  // populate section dropdown dynamically
  const secSel=document.getElementById('editSection');
  secSel.innerHTML=(S.workspaces||[]).map(ws=>`<option value="${ws.id}"${ws.id===t.section?' selected':''}>${esc(ws.label)}</option>`).join('');
  // priority
  document.querySelectorAll('#editPriRow .pri-box').forEach(b=>b.classList.toggle('sel',b.dataset.p===(t.priority||'medium')));
  // label picker
  const lp=document.getElementById('editLabelPicker');
  lp.innerHTML=COLOR_LABELS.map(c=>
    `<div class="label-opt${t.label===c.id?' sel':''}" data-lid="${c.id}" title="${c.label}" style="background:${c.color||'transparent'};border:2px solid ${c.color||'var(--border2)'}"></div>`
  ).join('');
  lp.querySelectorAll('.label-opt').forEach(o=>o.addEventListener('click',()=>{lp.querySelectorAll('.label-opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');}));
  // subtasks
  renderSubtaskEditor(t.subtasks||[]);
  // ai result
  document.getElementById('aiResult').innerHTML='';
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('editText').focus(),200);
  if(mode==='ai') setTimeout(()=>runAIBreakdown(id),300);
}

function renderSubtaskEditor(subtasks){
  const list=document.getElementById('subtaskEditList');
  list.innerHTML=subtasks.map((s,i)=>`
    <div class="subtask-edit-row" data-si="${i}">
      <input class="subtask-edit-input" value="${esc(s.text)}" placeholder="Sub-task…" data-si="${i}" />
      <button class="subtask-del-btn" data-si="${i}">×</button>
    </div>`).join('');
  list.querySelectorAll('.subtask-del-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=S.todos.find(x=>x.id===editingId);if(!t)return;
      t.subtasks.splice(parseInt(btn.dataset.si),1);
      renderSubtaskEditor(t.subtasks);
    });
  });
}

document.getElementById('btnAddSubtask').addEventListener('click',()=>{
  const t=S.todos.find(x=>x.id===editingId);if(!t)return;
  t.subtasks.push({id:uid(),text:'',done:false});
  renderSubtaskEditor(t.subtasks);
  // focus last input
  const inputs=document.querySelectorAll('.subtask-edit-input');
  if(inputs.length)inputs[inputs.length-1].focus();
});

document.getElementById('editCancel').addEventListener('click',()=>document.getElementById('editOverlay').classList.remove('open'));
document.getElementById('editOverlay').addEventListener('click',e=>{if(e.target.id==='editOverlay')document.getElementById('editOverlay').classList.remove('open');});
document.querySelectorAll('#editPriRow .pri-box').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#editPriRow .pri-box').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});});
document.getElementById('editSave').addEventListener('click',()=>{
  const t=S.todos.find(x=>x.id===editingId);if(!t)return;
  t.text=document.getElementById('editText').value.trim()||t.text;
  t.note=document.getElementById('editNote').value.trim();
  t.link=document.getElementById('editLink').value.trim();
  t.due=document.getElementById('editDue').value||null;
  t.section=document.getElementById('editSection').value;
  t.recur=document.getElementById('editRecur').value;
  const sp=document.querySelector('#editPriRow .pri-box.sel');if(sp)t.priority=sp.dataset.p;
  const sl=document.querySelector('#editLabelPicker .label-opt.sel');if(sl)t.label=sl.dataset.lid;
  // save subtask texts
  document.querySelectorAll('.subtask-edit-input').forEach((inp,i)=>{if(t.subtasks[i])t.subtasks[i].text=inp.value.trim();});
  t.subtasks=t.subtasks.filter(s=>s.text);
  save();document.getElementById('editOverlay').classList.remove('open');render();
});
document.getElementById('editText').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('editSave').click();});

/* ══════════════════════════════════════
   AI BREAKDOWN
══════════════════════════════════════ */
async function runAIBreakdown(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const res=document.getElementById('aiResult');
  res.innerHTML=`<div class="ai-loading">✦ Claude is breaking this down…</div>`;
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:`Break down this task into 3-6 concrete, actionable sub-tasks. Reply ONLY with a JSON array of strings, no markdown, no explanation. Task: "${t.text}"`}]
      })
    });
    const data=await response.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'[]';
    const subtasks=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(!Array.isArray(subtasks)||!subtasks.length){res.innerHTML='<div style="color:var(--danger);font-size:13px;">Could not parse response.</div>';return;}
    let h=`<div class="ai-result"><div class="ai-result-title">✦ Suggested sub-tasks — select to add:</div>`;
    subtasks.forEach((s,i)=>{h+=`<div class="ai-subtask-item"><div class="ai-subtask-check sel" data-i="${i}"></div><span>${esc(s)}</span></div>`;});
    h+=`<button class="btn-ai-apply" id="btnAiApply">Add selected sub-tasks</button></div>`;
    res.innerHTML=h;
    res.querySelectorAll('.ai-subtask-check').forEach(chk=>{
      chk.addEventListener('click',()=>chk.classList.toggle('sel'));
    });
    document.getElementById('btnAiApply').addEventListener('click',()=>{
      const t2=S.todos.find(x=>x.id===editingId);if(!t2)return;
      res.querySelectorAll('.ai-subtask-check.sel').forEach((chk,i)=>{
        const text=subtasks[parseInt(chk.dataset.i)];
        if(text&&!t2.subtasks.find(s=>s.text===text)) t2.subtasks.push({id:uid(),text,done:false});
      });
      renderSubtaskEditor(t2.subtasks);
      res.innerHTML='<div style="color:var(--success);font-size:13px;padding:8px 0;">✓ Sub-tasks added!</div>';
    });
  }catch(e){res.innerHTML=`<div style="color:var(--danger);font-size:13px;padding:8px 0;">Error: ${e.message}</div>`;}
}

let pendingDelId=null;
function confirmDelete(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  pendingDelId=id;
  document.getElementById('confirmMsg').textContent=`"${t.text.slice(0,60)}" will be permanently deleted.`;
  document.getElementById('confirmOverlay').classList.add('open');
}
document.getElementById('confirmNo').addEventListener('click',()=>{document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;});
document.getElementById('confirmYes').addEventListener('click',()=>{
  if(pendingDelId){S.todos=S.todos.filter(x=>x.id!==pendingDelId);save();}
  document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;render();
});
document.getElementById('confirmOverlay').addEventListener('click',e=>{if(e.target.id==='confirmOverlay'){document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;}});

let pendingMtgId=null;
document.getElementById('confirmMtgNo').addEventListener('click',()=>{document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;});
document.getElementById('confirmMtgYes').addEventListener('click',()=>{
  if(pendingMtgId){S.meetings=S.meetings.filter(m=>m.id!==pendingMtgId);save();}
  document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;render();
});

/* ══════════════════════════════════════
   MINI CALENDAR
══════════════════════════════════════ */
let mcCb=null,mcDate=null,mcMo=null,mcYr=null;
function showMiniCal(anchor,current,cb){
  closeMiniCal();mcCb=cb;
  const d=current?new Date(current+' 00:00'):new Date();
  mcMo=d.getMonth();mcYr=d.getFullYear();mcDate=current||todayStr();
  renderMiniCal(anchor);
}
function renderMiniCal(anchor){
  const old=document.getElementById('miniCal');if(old)old.remove();
  const cal=document.createElement('div');cal.className='mini-cal';cal.id='miniCal';
  cal.innerHTML=buildMiniCalHTML();
  document.body.appendChild(cal);
  const rect=anchor.getBoundingClientRect();
  let top=rect.bottom+6,left=rect.left;
  if(left+270>window.innerWidth)left=window.innerWidth-270;
  if(top+290>window.innerHeight)top=rect.top-295;
  if(top<8)top=8;
  cal.style.top=top+'px';cal.style.left=left+'px';
  cal.querySelector('#mcPrev').addEventListener('click',e=>{e.stopPropagation();mcMo--;if(mcMo<0){mcMo=11;mcYr--;}renderMiniCal(anchor);});
  cal.querySelector('#mcNext').addEventListener('click',e=>{e.stopPropagation();mcMo++;if(mcMo>11){mcMo=0;mcYr++;}renderMiniCal(anchor);});
  cal.querySelectorAll('.mini-cal-day[data-date]').forEach(d=>{
    d.addEventListener('click',e=>{e.stopPropagation();mcDate=d.dataset.date;if(mcCb)mcCb(d.dataset.date);closeMiniCal();});
  });
  cal.addEventListener('click',e=>e.stopPropagation());
}
function buildMiniCalHTML(){
  const yr=mcYr,mo=mcMo,today=todayStr();
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  const start=fd===0?6:fd-1;
  let h=`<div class="mini-cal-header"><button class="mini-cal-nav" id="mcPrev">‹</button><span class="mini-cal-title">${MONTHS[mo]} ${yr}</span><button class="mini-cal-nav" id="mcNext">›</button></div><div class="mini-cal-grid">`;
  ['M','T','W','T','F','S','S'].forEach(d=>{h+=`<div class="mini-cal-dname">${d}</div>`;});
  for(let i=start-1;i>=0;i--)h+=`<div class="mini-cal-day other-d">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${p2(mo+1)}-${p2(d)}`;
    h+=`<div class="mini-cal-day${ds===today?' today-d':''}${ds===mcDate?' sel-d':''}" data-date="${ds}">${d}</div>`;
  }
  const rem=(start+dim)%7===0?0:7-(start+dim)%7;
  for(let d=1;d<=rem;d++)h+=`<div class="mini-cal-day other-d">${d}</div>`;
  return h+`</div>`;
}
function closeMiniCal(){const c=document.getElementById('miniCal');if(c)c.remove();}
document.addEventListener('click',closeMiniCal);

/* ══════════════════════════════════════
   CALENDAR PAGE
══════════════════════════════════════ */
function renderCalendar(ca){
  const yr=S.calYear,mo=S.calMonth,today=new Date();
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  const start=fd===0?6:fd-1;
  const monthMtgs=S.meetings.filter(m=>{const d=new Date(m.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const dayMap={};
  monthMtgs.forEach(m=>{const d=parseInt(m.date.split('-')[2]);if(!dayMap[d])dayMap[d]=[];dayMap[d].push(m.section);});

  let grid=`<div class="cal-panel">
    <div class="calendar-header">
      <div class="cal-month-label">${MONTHS[mo]} ${yr}</div>
      <div class="cal-nav">
        <button class="btn-icon" id="calPrev">‹</button>
        <button class="btn-icon" id="calNext">›</button>
        <button class="btn-icon" id="calSync" title="Sync Google Calendar" style="font-size:13px;padding:0 10px;width:auto;gap:5px;display:flex;align-items:center;">🔄 Sync</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">${['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
      <div class="cal-days">`;

  for(let i=start-1;i>=0;i--){const pm=mo===0?11:mo-1,py=mo===0?yr-1:yr,day=dip-i,ds=`${py}-${p2(pm+1)}-${p2(day)}`;grid+=`<div class="cal-day other-month past" data-date="${ds}"><div class="cal-day-num" style="color:var(--text3)">${day}</div></div>`;}

  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${p2(mo+1)}-${p2(d)}`;
    const isT=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
    const isPast=ds<todayStr()&&!isT;
    const isSel=S.calSelected===ds;
    const dots=(dayMap[d]||[]).slice(0,4).map(s=>`<div class="cal-dot ${SECS[s].dot}"></div>`).join('');
    grid+=`<div class="cal-day${isT?' today':''}${isSel?' selected':''}${isPast?' past':''}" data-date="${ds}"><div class="cal-day-num">${d}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }

  const rem=(start+dim)%7===0?0:7-(start+dim)%7;
  for(let d=1;d<=rem;d++){const nm=mo===11?0:mo+1,ny=mo===11?yr+1:yr,ds=`${ny}-${p2(nm+1)}-${p2(d)}`;const isPast=ds<todayStr();const isSel=S.calSelected===ds;const dots=S.meetings.filter(m=>m.date===ds).slice(0,4).map(m=>`<div class="cal-dot ${SECS[m.section].dot}"></div>`).join('');grid+=`<div class="cal-day other-month${isPast?' past':''}${isSel?' selected':''}" data-date="${ds}"><div class="cal-day-num" style="color:var(--text3)">${d}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;}

  grid+=`</div></div><p class="cal-hint">${t('singleClick')}</p></div>`;

  const disp=S.calSelected?S.meetings.filter(m=>m.date===S.calSelected).sort((a,b)=>a.time.localeCompare(b.time)):monthMtgs.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  const ptitle=S.calSelected?`${t('meetings')} · ${fmtDate(S.calSelected)}`:`${t('allMeetings')} · ${MONTHS[mo]}`;

  let mp=`<div>`;
  if(S.quickMeeting){
    mp+=`<div class="quick-meeting"><h3>${t('newMeeting')} — ${fmtDate(S.quickMeeting)}</h3>
      <div class="qm-row"><input id="qmTitle" class="qm-input" placeholder="${t('newMeeting')}…" style="flex:2;min-width:160px" /></div>
      <div class="qm-row">
        <input id="qmDate" type="date" class="qm-input" value="${S.quickMeeting}" min="${todayStr()}" />
        <div class="time-picker">
          <select id="qmHour" class="qm-input time-sel"><option value="">HH</option>${Array.from({length:24},(_,i)=>`<option value="${p2(i)}">${p2(i)}</option>`).join('')}</select>
          <span class="time-colon">:</span>
          <select id="qmMin" class="qm-input time-sel"><option value="">MM</option>${['00','15','30','45'].map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
        </div>
        <select id="qmSec" class="qm-input">${(S.workspaces||DEFAULT_WS).map(ws=>`<option value="${ws.id}">${esc(ws.label)}</option>`).join('')}</select>
      </div>
      <div class="qm-row">
        <input id="qmNotes" class="qm-input" placeholder="Notes" style="flex:2;" />
        <select id="qmRecur" class="qm-input" style="flex:1;min-width:120px;">
          <option value="">${t('noRepeat')}</option>
          <option value="weekly">${t('weekly')}</option>
          <option value="monthly">${t('monthly')}</option>
        </select>
      </div>
      <div class="qm-actions"><button class="btn-cancel-qm" id="qmCancel">${t('cancel')}</button><button class="btn-save-mtg" id="qmSave">${t('saveMeeting')}</button></div>
    </div>`;
  }
  mp+=`<div class="meetings-panel-title">${ptitle}<span class="count-badge">${disp.length}</span>${S.calSelected?`<button class="filter-btn" id="clearSel" style="padding:2px 8px;font-size:11px">Clear</button>`:''}</div>`;
  if(!disp.length&&!S.quickMeeting) mp+=`<div class="empty-state" style="padding:24px 0">Double-click any day to add a meeting</div>`;
  disp.forEach(m=>{
    const info=SECS[m.section]||{tag:'tag-pro',label:'?'};
    const cleanNotes=stripHtml(m.notes||'');
    mp+=`<div class="meeting-item"><div class="meeting-time">${m.time||'--:--'}</div><div class="meeting-body"><div class="meeting-title">${esc(m.title)}</div><div class="meeting-sub"><span>${fmtDate(m.date)}</span>${cleanNotes?`<span>· ${esc(cleanNotes)}</span>`:''}<span class="tag ${info.tag}" style="padding:1px 6px;font-size:10px">${info.label}</span>${m.recur?`<span style="font-size:10px;color:var(--text3)">↻ ${cap(m.recur)}</span>`:''}</div></div><button class="meeting-del" data-id="${m.id}">×</button></div>`;
  });
  mp+=`</div>`;

  ca.innerHTML=`<div class="cal-layout">${grid}${mp}</div>`;

  document.getElementById('calPrev').addEventListener('click',()=>{S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}S.calSelected=null;S.quickMeeting=null;render();});
  document.getElementById('calNext').addEventListener('click',()=>{S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}S.calSelected=null;S.quickMeeting=null;render();});
  document.getElementById('calSync').addEventListener('click',async()=>{
    const btn=document.getElementById('calSync');
    btn.textContent='⏳ Syncing…'; btn.disabled=true;
    await syncGCal();
    // render is called inside syncGCal, button will be recreated
  });
  ca.querySelectorAll('.cal-day:not(.past)').forEach(day=>{
    day.addEventListener('click',()=>{if(!day.dataset.date)return;const d=day.dataset.date;S.calSelected=S.calSelected===d?null:d;S.quickMeeting=null;render();});
    day.addEventListener('dblclick',()=>{if(!day.dataset.date)return;S.calSelected=day.dataset.date;S.quickMeeting=day.dataset.date;render();setTimeout(()=>{const el=document.getElementById('qmTitle');if(el)el.focus();},30);});
  });
  document.getElementById('clearSel')?.addEventListener('click',()=>{S.calSelected=null;S.quickMeeting=null;render();});
  ca.querySelectorAll('.meeting-del').forEach(btn=>{btn.addEventListener('click',()=>{pendingMtgId=btn.dataset.id;document.getElementById('confirmMtgOverlay').classList.add('open');});});
  document.getElementById('confirmMtgOverlay').addEventListener('click',e=>{if(e.target.id==='confirmMtgOverlay'){document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;}});
  document.getElementById('qmCancel')?.addEventListener('click',()=>{S.quickMeeting=null;render();});
  document.getElementById('qmSave')?.addEventListener('click',()=>{
    const title=document.getElementById('qmTitle').value.trim(),date=document.getElementById('qmDate').value;
    if(!title||!date){document.getElementById('qmTitle').focus();return;}
    const h=document.getElementById('qmHour').value,m=document.getElementById('qmMin').value;
    const time=(h&&m)?`${h}:${m}`:'';
    const section=document.getElementById('qmSec').value;
    const notes=document.getElementById('qmNotes').value.trim();
    const recur=document.getElementById('qmRecur').value;

    // base meeting
    S.meetings.push({id:uid(),title,date,time,section,notes,recur});

    // spawn future occurrences (next 12 instances)
    if(recur==='weekly'||recur==='monthly'){
      let next=date;
      for(let i=0;i<11;i++){
        next=recur==='weekly'?addDays(next,7):addMonths(next,1);
        S.meetings.push({id:uid(),title,date:next,time,section,notes,recur});
      }
      toast(`↻ Created 12 ${recur} occurrences`);
    }

    S.quickMeeting=null;save();render();
  });
  document.getElementById('qmTitle')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('qmSave').click();if(e.key==='Escape'){S.quickMeeting=null;render();}});
}
