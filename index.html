<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AZ Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#eeede8;--surface3:#e6e4de;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --text:#1a1916;--text2:#6b6a65;--text3:#a09f9a;
  --accent:#2563eb;--accent-soft:#eff6ff;
  --danger:#dc2626;--danger-soft:#fef2f2;
  --success:#16a34a;--success-soft:#f0fdf4;
  --warning:#d97706;--warning-soft:#fffbeb;
  --purple:#7c3aed;--purple-soft:#f5f3ff;
  --pri-low:#2563eb;--pri-low-soft:#dbeafe;--pri-low-border:#93c5fd;
  --pri-med:#d97706;--pri-med-soft:#fef3c7;--pri-med-border:#fcd34d;
  --pri-high:#dc2626;--pri-high-soft:#fee2e2;--pri-high-border:#fca5a5;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1c1b19;--surface2:#242321;--surface3:#2e2d2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0efe9;--text2:#9e9d98;--text3:#6b6a65;
  --accent:#3b82f6;--accent-soft:#1e3a5f;
  --danger:#f87171;--danger-soft:#3b1c1c;
  --success:#4ade80;--success-soft:#14291e;
  --warning:#fbbf24;--warning-soft:#2d2009;
  --purple:#a78bfa;--purple-soft:#2d1f4a;
  --pri-low:#3b82f6;--pri-low-soft:#1e3a5f;--pri-low-border:#1d4ed8;
  --pri-med:#f59e0b;--pri-med-soft:#2d2009;--pri-med-border:#b45309;
  --pri-high:#f87171;--pri-high-soft:#3b1c1c;--pri-high-border:#991b1b;
  --shadow:0 1px 3px rgba(0,0,0,.4);--shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;}
.shell{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.header{position:sticky;top:0;z-index:300;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.header-right{display:flex;gap:6px;align-items:center;}
.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;}
.btn-icon:hover{background:var(--border2);color:var(--text);}
.btn-sync{display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-sync:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.btn-sync.ok .sync-dot{background:var(--success);}
.btn-sync.err .sync-dot{background:var(--danger);}
.btn-sync.syncing .sync-dot{background:var(--warning);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 6px;flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{padding:10px 13px;border:none;background:none;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-tab:hover:not(.active){color:var(--text);}

/* CONTENT */
.content-area{flex:1;padding:16px;width:100%;}
@media(min-width:900px){
  .content-area{padding:24px 32px;max-width:65%;}
  .todos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;align-items:start;}
  .cal-layout{display:grid;grid-template-columns:420px 1fr;gap:28px;align-items:start;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
}
@media(min-width:1280px){
  .todos-grid{grid-template-columns:repeat(4,1fr);}
  .cal-layout{grid-template-columns:480px 1fr;}
  .content-area{padding:28px 48px;max-width:62%;}
}
@media(min-width:1600px){.content-area{padding:32px 60px;max-width:60%;}}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600;}
.tag-perso{background:var(--purple-soft);color:var(--purple);}
.tag-pro{background:var(--accent-soft);color:var(--accent);}
.tag-brainlabs{background:var(--success-soft);color:var(--success);}
.tag-easyparts{background:var(--warning-soft);color:var(--warning);}

/* COLOR LABELS */
.clabel{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* SECTION BLOCK */
.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
@media(min-width:900px){.section-block{margin-bottom:0;}}
.accent-bar-perso{border-top:3px solid var(--purple);}
.accent-bar-pro{border-top:3px solid var(--accent);}
.accent-bar-brainlabs{border-top:3px solid var(--success);}
.accent-bar-easyparts{border-top:3px solid var(--warning);}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px;}
.section-label{font-size:16px;font-weight:700;color:var(--text);}
.count-badge{background:var(--surface);color:var(--text3);font-size:12px;padding:2px 8px;border-radius:20px;border:1px solid var(--border2);}

/* TODO ITEMS */
.todo-list{display:flex;flex-direction:column;}
.todo-item{padding:10px 16px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);transition:background .1s,transform .1s;position:relative;overflow:hidden;touch-action:pan-y;}
.todo-item:last-child{border-bottom:none;}
.todo-item.done{opacity:.45;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text3);}
.todo-item.pri-low{border-left:3px solid var(--pri-low);}
.todo-item.pri-medium{border-left:3px solid var(--pri-med);}
.todo-item.pri-high{border-left:3px solid var(--pri-high);}
.todo-item.pri-low:not(.done){background:var(--pri-low-soft);}
.todo-item.pri-medium:not(.done){background:var(--pri-med-soft);}
.todo-item.pri-high:not(.done){background:var(--pri-high-soft);}
.todo-item{cursor:grab;}
.todo-item:active{cursor:grabbing;transform:scale(.99);}
.todo-item.dragging{opacity:.35;background:var(--surface3)!important;}
.todo-item.drag-over-top{border-top:2px solid var(--accent)!important;}
.todo-item.drag-over-bot{border-bottom:2px solid var(--accent)!important;}

/* SWIPE FEEDBACK */
.todo-item.swipe-right{background:var(--success-soft)!important;}
.todo-item.swipe-left{background:var(--danger-soft)!important;}
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;opacity:0;transition:opacity .15s;}
.swipe-hint-right{left:12px;}
.swipe-hint-left{right:12px;}
.todo-item.swipe-right .swipe-hint-right,.todo-item.swipe-left .swipe-hint-left{opacity:1;}

/* DRAG HANDLE */
.drag-handle{width:18px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:2px 0;opacity:.25;transition:opacity .15s;pointer-events:none;}
.drag-handle span{display:block;width:12px;height:2px;border-radius:2px;background:var(--text2);}
.todo-item:hover .drag-handle{opacity:.6;}

.todo-body{flex:1;min-width:0;}
.todo-text{font-size:15px;line-height:1.45;color:var(--text);font-weight:500;}
.todo-note-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.todo-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.todo-date.ov{color:var(--danger);font-weight:600;}
.todo-link{font-size:12px;color:var(--accent);text-decoration:none;}
.todo-link:hover{text-decoration:underline;}
.pri-badge{font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;}
.pri-badge-low{background:var(--pri-low-soft);color:var(--pri-low);border:1px solid var(--pri-low-border);}
.pri-badge-medium{background:var(--pri-med-soft);color:var(--pri-med);border:1px solid var(--pri-med-border);}
.pri-badge-high{background:var(--pri-high-soft);color:var(--pri-high);border:1px solid var(--pri-high-border);}
.recur-badge{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;}

/* SUBTASKS */
.subtasks-wrap{margin-top:6px;}
.subtask-progress{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.subtask-progress-bar{height:100%;background:var(--success);border-radius:2px;transition:width .3s;}
.subtask-list{display:flex;flex-direction:column;gap:3px;}
.subtask-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface);}
.subtask-check.done{background:var(--success);border-color:var(--success);}
.subtask-check.done::after{content:'✓';color:white;font-size:9px;font-weight:700;}
.subtask-text.done{text-decoration:line-through;color:var(--text3);}

/* INLINE ADD */
.inline-add{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;border-top:1px solid var(--border);}
.inline-add:hover{background:var(--surface2);}
.add-plus{width:18px;height:18px;border-radius:4px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0;}
.add-prompt{font-size:14px;color:var(--text3);}
.inline-input-wrap{padding:12px 16px;border-top:2px solid var(--accent);background:var(--accent-soft);}
.inline-text-input{width:100%;border:none;background:none;font-family:inherit;font-size:15px;color:var(--text);outline:none;margin-bottom:10px;font-weight:500;}
.inline-text-input::placeholder{color:var(--text3);}
.inline-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pri-box{padding:5px 12px;border-radius:8px;border:2px solid transparent;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--surface);}
.pri-box.low{border-color:var(--pri-low-border);color:var(--pri-low);}
.pri-box.low.sel,.pri-box.low:hover{background:var(--pri-low);color:white;border-color:var(--pri-low);}
.pri-box.medium{border-color:var(--pri-med-border);color:var(--pri-med);}
.pri-box.medium.sel,.pri-box.medium:hover{background:var(--pri-med);color:white;border-color:var(--pri-med);}
.pri-box.high{border-color:var(--pri-high-border);color:var(--pri-high);}
.pri-box.high.sel,.pri-box.high:hover{background:var(--pri-high);color:white;border-color:var(--pri-high);}
.inline-date-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.inline-date-btn:hover,.inline-date-btn.has-date{border-color:var(--accent);color:var(--accent);}
.inline-save{padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;}
.inline-cancel{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.filter-btn:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* CONTEXT MENU */
.ctx-menu{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:4px;min-width:200px;animation:fadeIn .12s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:10px 14px;border-radius:7px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);transition:background .1s;white-space:nowrap;}
.ctx-item:hover{background:var(--surface2);}
.ctx-item.danger{color:var(--danger);}
.ctx-item.danger:hover{background:var(--danger-soft);}
.ctx-item.success{color:var(--success);}
.ctx-item.success:hover{background:var(--success-soft);}
.ctx-item.ai{color:var(--purple);}
.ctx-item.ai:hover{background:var(--purple-soft);}
.ctx-sep{height:1px;background:var(--border);margin:3px 6px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:500px;padding:24px;transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-family:inherit;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.5;}
.pri-row{display:flex;gap:8px;flex-wrap:wrap;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:11px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;}
.btn-cancel:hover{background:var(--surface3);}
.btn-confirm{flex:2;padding:11px;border-radius:9px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{opacity:.88;}
.confirm-box{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:360px;padding:24px;transform:translateY(10px);transition:transform .2s;}
.overlay.open .confirm-box{transform:translateY(0);}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.confirm-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-actions{display:flex;gap:10px;}
.btn-confirm-del{flex:1;padding:10px;border-radius:9px;border:none;background:var(--danger);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}

/* SUBTASK EDIT in modal */
.subtask-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.subtask-edit-row{display:flex;align-items:center;gap:8px;}
.subtask-edit-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:14px;color:var(--text);outline:none;}
.subtask-edit-input:focus{border-color:var(--accent);}
.subtask-del-btn{width:26px;height:26px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.subtask-del-btn:hover{background:var(--danger-soft);color:var(--danger);}
.btn-add-subtask{background:none;border:1px dashed var(--border2);border-radius:7px;padding:6px 12px;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;width:100%;text-align:left;transition:all .15s;}
.btn-add-subtask:hover{border-color:var(--accent);color:var(--accent);}

/* COLOR LABEL PICKER */
.label-picker{display:flex;gap:8px;flex-wrap:wrap;}
.label-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s;}
.label-opt:hover{transform:scale(1.15);}
.label-opt.sel{border-color:var(--text);}

/* AI BREAKDOWN */
.ai-result{background:var(--purple-soft);border:1px solid var(--purple);border-radius:var(--radius);padding:12px 14px;margin-top:10px;}
.ai-result-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;}
.ai-subtask-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:var(--text);}
.ai-subtask-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--purple);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface);}
.ai-subtask-check.sel{background:var(--purple);border-color:var(--purple);}
.ai-subtask-check.sel::after{content:'✓';color:white;font-size:9px;font-weight:700;}
.btn-ai-apply{background:var(--purple);color:white;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;width:100%;}
.ai-loading{text-align:center;padding:16px;color:var(--purple);font-size:14px;}

/* MINI CALENDAR */
.mini-cal{position:fixed;z-index:9000;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:14px;width:260px;animation:fadeIn .15s ease;}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mini-cal-title{font-size:14px;font-weight:700;}
.mini-cal-nav{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:5px;}
.mini-cal-nav:hover{background:var(--surface2);}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-cal-dname{text-align:center;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:3px 0;}
.mini-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s;}
.mini-cal-day:hover:not(.other-d){background:var(--surface2);}
.mini-cal-day.today-d{font-weight:700;color:var(--accent);}
.mini-cal-day.sel-d{background:var(--accent)!important;color:white!important;border-radius:50%;}
.mini-cal-day.other-d{color:var(--text3);opacity:.4;cursor:default;}

/* EMPTY */
.empty-state{text-align:center;padding:20px 16px;color:var(--text3);font-size:14px;}

/* CALENDAR PAGE */
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month-label{font-size:20px;font-weight:700;}
.cal-nav{display:flex;gap:6px;}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-day-name{text-align:center;padding:8px 2px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover:not(.past){background:var(--surface2);}
.cal-day.past{pointer-events:none;opacity:.35;}
.cal-day.today .cal-day-num{background:var(--accent);color:white;font-weight:700;}
.cal-day.selected{background:var(--accent-soft);}
.cal-day-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);}
.cal-day.other-month .cal-day-num{color:var(--text3);}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.dot-perso{background:var(--purple);}
.dot-pro{background:var(--accent);}
.dot-brainlabs{background:var(--success);}
.dot-easyparts{background:var(--warning);}
.cal-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px;}
.meetings-panel-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.meeting-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;box-shadow:var(--shadow);}
.meeting-item:hover{border-color:var(--border2);}
.meeting-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:40px;padding-top:1px;}
.meeting-body{flex:1;min-width:0;}
.meeting-title{font-size:14px;color:var(--text);font-weight:600;}
.meeting-sub{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-family:'DM Mono',monospace;}
.meeting-del{width:24px;height:24px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;}
.meeting-item:hover .meeting-del{opacity:1;}
.meeting-del:hover{background:var(--danger-soft);color:var(--danger);}
.quick-meeting{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-md);}
.quick-meeting h3{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;}
.qm-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.qm-input{flex:1;min-width:100px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;}
.qm-input:focus{border-color:var(--accent);}
.qm-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn-save-mtg{background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 18px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel-qm{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:13px;cursor:pointer;}
.time-picker{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.time-sel{flex:1;min-width:60px;padding:7px 6px;text-align:center;}
.time-colon{font-weight:700;font-size:16px;color:var(--text2);}

/* WEEKLY VIEW */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.week-title{font-size:18px;font-weight:700;}
.week-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;}
.week-col-head{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.week-col-day{font-size:14px;font-weight:700;color:var(--text);}
.week-col-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.week-col-head.today-col{background:var(--accent-soft);}
.week-col-head.today-col .week-col-day{color:var(--accent);}
.week-item{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s;}
.week-item:last-child{border-bottom:none;}
.week-item:hover{background:var(--surface2);}
.week-item.done-item{opacity:.45;}
.week-item.done-item span{text-decoration:line-through;}
.week-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.week-mtg{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px;}
.week-mtg:last-child{border-bottom:none;}
.week-mtg-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);min-width:38px;}
.week-empty{padding:12px 14px;font-size:13px;color:var(--text3);text-align:center;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
@media(min-width:600px){.dash-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.dash-grid{grid-template-columns:repeat(6,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--shadow);transition:box-shadow .15s;}
.stat-card:hover{box-shadow:var(--shadow-md);}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.stat-card.red .stat-value{color:var(--danger);}
.stat-card.amber .stat-value{color:var(--warning);}
.stat-card.blue .stat-value{color:var(--accent);}
.stat-card.green .stat-value{color:var(--success);}
.stat-card.purple .stat-value{color:var(--purple);}
.dash-section{margin-bottom:8px;}
.dash-section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.acc-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;user-select:none;transition:background .15s;margin-bottom:2px;}
.acc-header:hover{background:var(--surface2);}
.acc-header.open{border-radius:var(--radius-lg) var(--radius-lg) 0 0;border-bottom-color:transparent;margin-bottom:0;}
.acc-icon{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.acc-header.open .acc-icon{transform:rotate(90deg);}
.acc-label{flex:1;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.acc-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow:hidden;margin-bottom:8px;}
.acc-body.hidden{display:none;}
.acc-empty{padding:12px 16px;font-size:13px;color:var(--text3);}
.dash-todo-row{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;}
.dash-todo-row:last-child{border-bottom:none;}
.dash-todo-row:hover{background:var(--surface2);}
.dash-todo-text{flex:1;font-size:14px;font-weight:500;}
.dash-todo-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dash-mtg-row{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.dash-mtg-row:last-child{border-bottom:none;}
.dash-mtg-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:44px;}

/* DAILY DIGEST */
.digest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.digest-box{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:24px;animation:fadeIn .2s ease;}
.digest-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.digest-date{font-size:13px;color:var(--text3);margin-bottom:20px;font-family:'DM Mono',monospace;}
.digest-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.digest-row:last-of-type{border-bottom:none;}
.digest-label{font-size:14px;color:var(--text2);}
.digest-num{font-size:22px;font-weight:700;}
.digest-num.red{color:var(--danger);}
.digest-num.amber{color:var(--warning);}
.digest-num.blue{color:var(--accent);}
.digest-num.purple{color:var(--purple);}
.digest-close{width:100%;margin-top:20px;padding:12px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* NOTIF PERMISSION */
.notif-bar{background:var(--purple-soft);border-bottom:1px solid var(--purple);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:var(--purple);}
.notif-bar-btn{background:var(--purple);color:white;border:none;border-radius:6px;padding:4px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

@media print{
  .header,.nav,.filter-bar,.inline-add,.btn-sync,.btn-icon,.ctx-menu{display:none!important;}
  .content-area{padding:0;max-width:100%!important;}
  .section-block{break-inside:avoid;box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>
<div class="shell">
  <div id="notifBar" style="display:none">
    <div class="notif-bar">
      <span>Enable notifications for meeting & due task reminders</span>
      <div style="display:flex;gap:6px;">
        <button class="notif-bar-btn" id="notifAllow">Enable</button>
        <button class="notif-bar-btn" style="background:transparent;color:var(--purple);border:1px solid var(--purple);" id="notifDismiss">Later</button>
      </div>
    </div>
  </div>
  <header class="header">
    <div class="logo">AZ <span>Todo</span></div>
    <div class="header-right">
      <button class="btn-sync" id="syncBtn"><span class="sync-dot"></span> Sync</button>
      <button class="btn-icon" id="pdfBtn" title="Export PDF">⬇</button>
      <button class="btn-icon" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </header>
  <nav class="nav">
    <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
    <button class="nav-tab" data-tab="all">All</button>
    <button class="nav-tab" data-tab="perso">Perso</button>
    <button class="nav-tab" data-tab="pro">Pro</button>
    <button class="nav-tab" data-tab="brainlabs">Brainlabs</button>
    <button class="nav-tab" data-tab="easyparts">EasyParts</button>
    <button class="nav-tab" data-tab="week">Week</button>
    <button class="nav-tab" data-tab="calendar">Calendar</button>
  </nav>
  <div class="content-area" id="contentArea"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-title">Edit task</div>
    <div class="form-group">
      <label class="form-label">Task</label>
      <input class="form-input" id="editText" type="text" />
    </div>
    <div class="form-group">
      <label class="form-label">Note</label>
      <textarea class="form-input form-textarea" id="editNote" placeholder="Add a note…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Link (URL)</label>
      <input class="form-input" id="editLink" type="url" placeholder="https://…" />
    </div>
    <div class="form-group">
      <label class="form-label">Due date</label>
      <input class="form-input" id="editDue" type="date" />
    </div>
    <div class="form-group">
      <label class="form-label">Priority</label>
      <div class="pri-row" id="editPriRow">
        <button class="pri-box low" data-p="low">Low</button>
        <button class="pri-box medium" data-p="medium">Medium</button>
        <button class="pri-box high" data-p="high">High</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Recurring</label>
      <select class="form-input" id="editRecur">
        <option value="">None</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Color label</label>
      <div class="label-picker" id="editLabelPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Sub-tasks</label>
      <div class="subtask-edit-list" id="subtaskEditList"></div>
      <button class="btn-add-subtask" id="btnAddSubtask">+ Add sub-task</button>
    </div>
    <div class="form-group">
      <label class="form-label">Section</label>
      <select class="form-input" id="editSection">
        <option value="perso">Perso</option>
        <option value="pro">Pro</option>
        <option value="brainlabs">Brainlabs</option>
        <option value="easyparts">EasyParts</option>
      </select>
    </div>
    <div id="aiResult"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="editCancel">Cancel</button>
      <button class="btn-confirm" id="editSave">Save changes</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Task -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete task?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmNo" style="flex:1">Cancel</button>
      <button class="btn-confirm-del" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Meeting -->
<div class="overlay" id="confirmMtgOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete meeting?</div>
    <div class="confirm-msg">This cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmMtgNo" style="flex:1">Cancel</button>
      <button class="btn-confirm-del" id="confirmMtgYes">Delete</button>
    </div>
  </div>
</div>

<!-- Daily Digest -->
<div id="digestOverlay" style="display:none" class="digest-overlay">
  <div class="digest-box" id="digestBox"></div>
</div>

<script>
/* ══ CONSTANTS ══ */
const SECS={
  perso:    {label:'Perso',    tag:'tag-perso',    dot:'dot-perso',    bar:'accent-bar-perso',    color:'var(--purple)'},
  pro:      {label:'Pro',      tag:'tag-pro',       dot:'dot-pro',      bar:'accent-bar-pro',       color:'var(--accent)'},
  brainlabs:{label:'Brainlabs',tag:'tag-brainlabs', dot:'dot-brainlabs',bar:'accent-bar-brainlabs', color:'var(--success)'},
  easyparts:{label:'EasyParts',tag:'tag-easyparts', dot:'dot-easyparts',bar:'accent-bar-easyparts', color:'var(--warning)'},
};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SMON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const COLOR_LABELS=[
  {id:'',color:'',label:'None'},
  {id:'red',color:'#ef4444',label:'Red'},
  {id:'orange',color:'#f97316',label:'Orange'},
  {id:'yellow',color:'#eab308',label:'Yellow'},
  {id:'green',color:'#22c55e',label:'Green'},
  {id:'blue',color:'#3b82f6',label:'Blue'},
  {id:'purple',color:'#a855f7',label:'Purple'},
  {id:'pink',color:'#ec4899',label:'Pink'},
  {id:'gray',color:'#6b7280',label:'Gray'},
];

/* ══ STATE ══ */
let S={
  theme:'auto', tab:'dashboard', filter:'active',
  calMonth:new Date().getMonth(), calYear:new Date().getFullYear(),
  calSelected:null, quickMeeting:null,
  todos:[], meetings:[],
  inlineOpen:null, inlineState:{}, dashOpen:{},
  weekOffset:0,
};

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('aztodo_v5')||'{}');
    ['theme','todos','meetings','filter'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    // migrate old data: ensure subtasks & new fields exist
    S.todos.forEach(t=>{
      if(!t.subtasks)t.subtasks=[];
      if(!t.label)t.label='';
      if(!t.recur)t.recur='';
      if(!t.note)t.note='';
      if(!t.link)t.link='';
    });
  }catch(e){}
}

let _pushTimer=null;
function save(){
  localStorage.setItem('aztodo_v5',JSON.stringify({theme:S.theme,todos:S.todos,meetings:S.meetings,filter:S.filter}));
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>cloudPush(),1500);
}
load();

/* ══ THEME ══ */
function applyTheme(){
  let t=S.theme;
  if(t==='auto') t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=S.theme==='auto'?'🌗':t==='dark'?'☀️':'🌙';
}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyTheme);
document.getElementById('themeBtn').addEventListener('click',()=>{
  S.theme=S.theme==='light'?'dark':S.theme==='dark'?'auto':'light';
  applyTheme(); save();
});

/* ══ TABS ══ */
document.querySelectorAll('.nav-tab').forEach(t=>{
  t.addEventListener('click',()=>{
    S.tab=t.dataset.tab; S.inlineOpen=null; S.quickMeeting=null;
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); render();
  });
});

/* ══ UTILS ══ */
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function p2(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function dateFromStr(s){return s?new Date(s+' 00:00'):null;}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return `${parseInt(d)} ${SMON[parseInt(m)-1]} ${y}`;}
function addDays(s,n){const d=new Date(s+' 00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function addMonths(s,n){const d=new Date(s+' 00:00');d.setMonth(d.getMonth()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function isOv(due,done){if(!due||done)return false;const t=new Date();t.setHours(0,0,0,0);return new Date(due+' 00:00')<t;}
function getLabelColor(id){return COLOR_LABELS.find(c=>c.id===id)?.color||'';}

/* ══ TOAST ══ */
function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

/* ══ CLOUD SYNC ══ */
function syncStatus(cls){const btn=document.getElementById('syncBtn');if(!btn)return;btn.className='btn-sync '+(cls||'');}
async function cloudPush(){
  syncStatus('syncing');
  try{
    const r=await fetch('/api/sync',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({todos:S.todos,meetings:S.meetings,theme:S.theme,filter:S.filter})});
    if(!r.ok)throw new Error(r.status);
    syncStatus('ok'); toast('✓ Synced');
  }catch(e){syncStatus('');} // silent fail when running locally
}
async function cloudPull(){
  syncStatus('syncing');
  try{
    const r=await fetch('/api/sync');
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    if(d.todos)S.todos=d.todos;
    if(d.meetings)S.meetings=d.meetings;
    if(d.theme)S.theme=d.theme;
    if(d.filter)S.filter=d.filter;
    S.todos.forEach(t=>{if(!t.subtasks)t.subtasks=[];if(!t.label)t.label='';if(!t.recur)t.recur='';});
    save(); syncStatus('ok'); toast('✓ Loaded from cloud'); applyTheme(); render();
  }catch(e){syncStatus('');}
}
window.addEventListener('load',()=>cloudPull());
document.getElementById('syncBtn').addEventListener('click',()=>cloudPush());

/* ══ PDF EXPORT ══ */
document.getElementById('pdfBtn').addEventListener('click',()=>{
  window.print();
});

/* ══ NOTIFICATIONS ══ */
let notifEnabled=localStorage.getItem('aztodo_notif')==='true';
function checkNotifBar(){
  if(notifEnabled||Notification.permission==='granted'||Notification.permission==='denied')return;
  document.getElementById('notifBar').style.display='block';
}
document.getElementById('notifAllow')?.addEventListener('click',async()=>{
  const p=await Notification.requestPermission();
  if(p==='granted'){notifEnabled=true;localStorage.setItem('aztodo_notif','true');toast('✓ Notifications enabled');}
  document.getElementById('notifBar').style.display='none';
});
document.getElementById('notifDismiss')?.addEventListener('click',()=>{
  document.getElementById('notifBar').style.display='none';
});
function scheduleNotifs(){
  if(Notification.permission!=='granted')return;
  const now=new Date();
  const today=todayStr();
  // meetings today — notify 15 min before
  S.meetings.filter(m=>m.date===today&&m.time).forEach(m=>{
    const[hh,mm]=m.time.split(':').map(Number);
    const mtgTime=new Date();
    mtgTime.setHours(hh,mm,0,0);
    const diff=mtgTime-now-15*60*1000;
    if(diff>0&&diff<8*60*60*1000){
      setTimeout(()=>new Notification('AZ Todo — Meeting in 15 min',{body:m.title,icon:'/favicon.ico'}),diff);
    }
  });
  // tasks due today
  S.todos.filter(t=>!t.done&&t.due===today).forEach(t=>{
    const notifAt=new Date();
    notifAt.setHours(9,0,0,0);
    const diff2=notifAt-now;
    if(diff2>0&&diff2<2*60*60*1000){
      setTimeout(()=>new Notification('AZ Todo — Due today',{body:t.text}),diff2);
    }
  });
}
window.addEventListener('load',()=>{
  checkNotifBar();
  if(Notification.permission==='granted')scheduleNotifs();
});

/* ══ RECURRING TASK SPAWNER ══ */
function spawnRecurring(){
  const today=todayStr();
  const newTasks=[];
  S.todos.filter(t=>t.recur&&t.due&&!t.done).forEach(t=>{
    if(t.due<today){
      let next=t.due;
      while(next<today){
        if(t.recur==='daily') next=addDays(next,1);
        else if(t.recur==='weekly') next=addDays(next,7);
        else if(t.recur==='monthly') next=addMonths(next,1);
        else break;
      }
      if(next!==t.due&&!S.todos.find(x=>x.text===t.text&&x.due===next&&x.section===t.section)){
        newTasks.push({...t,id:uid(),due:next,done:false,subtasks:t.subtasks.map(s=>({...s,done:false})),created:new Date().toISOString()});
      }
    }
  });
  if(newTasks.length){S.todos.push(...newTasks);save();}
}
spawnRecurring();

function accSection(id,icon,label,colorCss,count,rows,openByDefault){
  const isOpen=S.dashOpen[id]!==undefined?S.dashOpen[id]:openByDefault;
  let h=`<div class="acc-wrap" data-acc="${id}">
    <div class="acc-header${isOpen?' open':''}">

    <div class="stat-card red"><div class="stat-label">High priority</div><div class="stat-value">${highPri.length}</div><div class="stat-sub">urgent</div></div>

  </div>`;

  // Today's meetings static
  h+=`<div class="dash-section"><div class="dash-section-title">📅 Today's meetings <span class="count-badge">${todayMtgs.length}</span></div>`;

  h+=accSection('dueToday','⏰','Due today','var(--warning)',dueToday.length,dueToday.map(dashTodoRow),true);
  h+=accSection('dueTomorrow','📅','Due tomorrow','var(--text2)',dueTomorrow.length,dueTomorrow.map(dashTodoRow),false);
  h+=accSection('highPri','🔴','High priority','var(--danger)',highPri.length,highPri.map(dashTodoRow),true);
  h+=accSection('medPri','🟡','Medium priority','var(--warning)',medPri.length,medPri.map(dashTodoRow),false);
  h+=accSection('lowPri','🔵','Low priority','var(--accent)',lowPri.length,lowPri.map(dashTodoRow),false);
  if(upcomingMtgs.length){
    const rows=upcomingMtgs.map(m=>{const i=SECS[m.section];return `<div class="dash-mtg-row"><div class="dash-mtg-time">${fmtDate(m.date)}</div><div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(m.title)}</div>${m.time?`<div style="font-size:12px;color:var(--text3)">${m.time}</div>`:''}</div><span class="tag ${i.tag}" style="font-size:11px">${i.label}</span></div>`;});

function cap(s){return s?s[0].toUpperCase()+s.slice(1):'';}

function renderTodos(ca){
  const isSingle=S.tab!=='all';
  const secs=isSingle?[S.tab]:['perso','pro','brainlabs','easyparts'];
  let h=`<div class="filter-bar">
    <button class="filter-btn ${S.filter==='active'?'active':''}" data-f="active">Active</button>
    <button class="filter-btn ${S.filter==='all'?'active':''}" data-f="all">All</button>
    <button class="filter-btn ${S.filter==='done'?'active':''}" data-f="done">Done</button>
  </div><div class="${isSingle?'':'todos-grid'}">`;
  secs.forEach(sec=>{h+=buildSection(sec);});
  h+=`</div>`;
  ca.innerHTML=h;
  bindTodoEvents(ca,secs);
}

function buildSection(sec){
  const info=SECS[sec];
  let todos=S.todos.filter(t=>t.section===sec);
  if(S.filter==='active') todos=todos.filter(t=>!t.done);
  if(S.filter==='done')   todos=todos.filter(t=>t.done);
  const activeN=S.todos.filter(t=>t.section===sec&&!t.done).length;

  let h=`<div class="section-block ${info.bar}">
    <div class="section-head">
      <span class="tag ${info.tag}"><span class="section-label">${info.label}</span></span>
      <span class="count-badge">${activeN}</span>
    </div><div class="todo-list">`;

  if(!todos.length) h+=`<div class="empty-state">No tasks — click below to add one</div>`;

  todos.forEach(t=>{
    const ov=isOv(t.due,t.done);
    const pri=t.priority||'medium';
    const lc=getLabelColor(t.label);
    const doneSubtasks=t.subtasks.filter(s=>s.done).length;
    const totalSubtasks=t.subtasks.length;
    const pct=totalSubtasks?Math.round(doneSubtasks/totalSubtasks*100):0;

    h+=`<div class="todo-item pri-${pri}${t.done?' done':''}" data-id="${t.id}" draggable="true" data-sec="${sec}">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="todo-body">
        <div style="display:flex;align-items:center;gap:6px;">
          ${lc?`<span class="clabel" style="background:${lc}"></span>`:''}
          <div class="todo-text">${esc(t.text)}</div>
        </div>
        ${t.note?`<div class="todo-note-preview">${esc(t.note.split('\n')[0])}</div>`:''}
        ${totalSubtasks?`<div class="subtasks-wrap">
          <div class="subtask-progress"><div class="subtask-progress-bar" style="width:${pct}%"></div></div>
          <div style="font-size:11px;color:var(--text3)">${doneSubtasks}/${totalSubtasks} sub-tasks</div>
        </div>`:''}
        <div class="todo-meta">
          ${t.due?`<span class="todo-date${ov?' ov':''}">${fmtDate(t.due)}${ov?' · overdue':''}</span>`:''}
          <span class="pri-badge pri-badge-${pri}">${cap(pri)}</span>
          ${t.recur?`<span class="recur-badge">↻ ${cap(t.recur)}</span>`:''}
          ${t.link?`<a class="todo-link" href="${esc(t.link)}" target="_blank" onclick="event.stopPropagation()">🔗</a>`:''}
          ${t.done?`<span style="font-size:11px;color:var(--success);font-weight:600;">✓ Done</span>`:''}
        </div>
      </div>
      <div class="swipe-hint swipe-hint-right">✓</div>
      <div class="swipe-hint swipe-hint-left">🗑</div>
    </div>`;
  });

  // inline add
  const ist=S.inlineState[sec]||{};
  if(S.inlineOpen===sec){
    const dp=ist.pri||'medium';
    const dd=ist.date||todayStr();
    h+=`<div class="inline-input-wrap">
      <input id="ii_${sec}" class="inline-text-input" placeholder="Task name… (Enter to save, Esc to cancel)" value="${esc(ist.text||'')}" />
      <div class="inline-controls">
        <button class="pri-box low${dp==='low'?' sel':''}" data-pri="low" data-sec="${sec}">Low</button>
        <button class="pri-box medium${dp==='medium'?' sel':''}" data-pri="medium" data-sec="${sec}">Medium</button>
        <button class="pri-box high${dp==='high'?' sel':''}" data-pri="high" data-sec="${sec}">High</button>
        <button class="inline-date-btn${dd?' has-date':''}" id="idb_${sec}">${dd?fmtDate(dd):'Pick date'}</button>
        <button id="isave_${sec}" class="inline-save">Add</button>
        <button id="icancel_${sec}" class="inline-cancel">×</button>
      </div>
    </div>`;
  } else {
    h+=`<div class="inline-add" data-sec="${sec}"><div class="add-plus">+</div><span class="add-prompt">Click to add a task…</span></div>`;
  }
  h+=`</div></div>`;
  return h;
}

function bindTodoEvents(ca,secs){
  ca.querySelectorAll('.filter-btn[data-f]').forEach(b=>{b.addEventListener('click',()=>{S.filter=b.dataset.f;render();});});

  let dragId=null,didDrag=false;
  ca.querySelectorAll('.todo-item[draggable]').forEach(el=>{
    // drag
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;didDrag=false;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragId);setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('drag',()=>{didDrag=true;});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');ca.querySelectorAll('.todo-item').forEach(x=>{x.classList.remove('drag-over-top','drag-over-bot');});dragId=null;});
    el.addEventListener('dragover',e=>{e.preventDefault();if(!dragId||el.dataset.id===dragId)return;const rect=el.getBoundingClientRect();ca.querySelectorAll('.todo-item').forEach(x=>{x.classList.remove('drag-over-top','drag-over-bot');});el.classList.add(e.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bot');});
    el.addEventListener('dragleave',()=>{el.classList.remove('drag-over-top','drag-over-bot');});
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over-top','drag-over-bot');
      if(!dragId||el.dataset.id===dragId)return;
      const fromSec=ca.querySelector(`.todo-item[data-id="${dragId}"]`)?.dataset.sec;
      if(fromSec!==el.dataset.sec)return;
      const fi=S.todos.findIndex(x=>x.id===dragId);
      let ti=S.todos.findIndex(x=>x.id===el.dataset.id);
      if(fi<0||ti<0)return;
      const rect=el.getBoundingClientRect();
      const after=e.clientY>=rect.top+rect.height/2;
      const[moved]=S.todos.splice(fi,1);
      ti=S.todos.findIndex(x=>x.id===el.dataset.id);
      S.todos.splice(after?ti+1:ti,0,moved);
      save();render();
    });

    // swipe on touch
    let tx0=null,ty0=null,swiping=false;
    el.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;swiping=false;},{passive:true});
    el.addEventListener('touchmove',e=>{
      if(tx0===null)return;
      const dx=e.touches[0].clientX-tx0,dy=e.touches[0].clientY-ty0;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){
        swiping=true;
        el.classList.toggle('swipe-right',dx>60);
        el.classList.toggle('swipe-left',dx<-60);
      }
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(swiping){
        const dx=e.changedTouches[0].clientX-tx0;
        if(dx>80) toggleDone(el.dataset.id);
        else if(dx<-80) confirmDelete(el.dataset.id);
        el.classList.remove('swipe-right','swipe-left');
      }
      tx0=null;ty0=null;swiping=false;
    });

    // click → edit
    el.addEventListener('click',e=>{
      if(didDrag){didDrag=false;return;}
      if(e.target.closest('.todo-link'))return;
      if(el.dataset.lp==='1'){el.dataset.lp='';return;}
      openEditModal(el.dataset.id);
    });
    // right-click / long press
    el.addEventListener('contextmenu',e=>{e.preventDefault();showCtx({clientX:e.clientX,clientY:e.clientY},el.dataset.id);});
    addLongPress(el,coords=>{el.dataset.lp='1';showCtx(coords,el.dataset.id);});
  });

  // inline add
  ca.querySelectorAll('.inline-add').forEach(el=>{
    el.addEventListener('click',()=>{
      S.inlineOpen=el.dataset.sec;
      if(!S.inlineState[el.dataset.sec]) S.inlineState[el.dataset.sec]={pri:'medium',date:todayStr(),text:''};
      render();
      setTimeout(()=>{const i=document.getElementById('ii_'+el.dataset.sec);if(i)i.focus();},30);
    });
  });
  secs.forEach(sec=>{
    const inp=document.getElementById('ii_'+sec);if(!inp)return;
    inp.addEventListener('input',()=>{S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].text=inp.value;});
    ca.querySelectorAll(`.pri-box[data-sec="${sec}"]`).forEach(btn=>{
      btn.addEventListener('click',()=>{
        S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].pri=btn.dataset.pri;
        ca.querySelectorAll(`.pri-box[data-sec="${sec}"]`).forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
      });
    });
    document.getElementById('idb_'+sec)?.addEventListener('click',e=>{
      e.stopPropagation();
      showMiniCal(e.currentTarget,S.inlineState[sec]?.date||todayStr(),picked=>{
        S.inlineState[sec]=S.inlineState[sec]||{};S.inlineState[sec].date=picked;
        const btn=document.getElementById('idb_'+sec);
        if(btn){btn.textContent=fmtDate(picked);btn.classList.add('has-date');}
      });
    });
    const doSave=()=>{
      const text=inp.value.trim();
      if(text){
        const st=S.inlineState[sec]||{};
        S.todos.push({id:uid(),text,section:sec,priority:st.pri||'medium',due:st.date||null,done:false,note:'',link:'',label:'',recur:'',subtasks:[],created:new Date().toISOString()});
        save();
      }
      S.inlineOpen=null;delete S.inlineState[sec];render();
    };
    const doCancel=()=>{S.inlineOpen=null;delete S.inlineState[sec];render();};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')doCancel();});
    document.getElementById('isave_'+sec)?.addEventListener('click',doSave);
    document.getElementById('icancel_'+sec)?.addEventListener('click',doCancel);
  });
}

function toggleDone(id){const t=S.todos.find(x=>x.id===id);if(t){t.done=!t.done;save();render();}}

/* ══════════════════════════════════════
   WEEKLY VIEW

function renderWeek(ca){
  const today=new Date();
  const dow=(today.getDay()+6)%7; // 0=Mon
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-dow+S.weekOffset*7);

  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  });

  const ws=fmtDate(days[0]),we=fmtDate(days[6]);
  let h=`<div class="week-header">
    <div class="week-title">${ws} — ${we}</div>
    <div style="display:flex;gap:6px;">
      <button class="btn-icon" id="weekPrev">‹</button>
      <button class="btn-icon" id="weekToday">Today</button>
      <button class="btn-icon" id="weekNext">›</button>
    </div>
  </div><div class="week-grid">`;

  days.forEach((ds,i)=>{
    const isToday=ds===todayStr();
    const dayTodos=S.todos.filter(t=>t.due===ds);
    const dayMtgs=S.meetings.filter(m=>m.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
    const d=new Date(ds+' 00:00');
    h+=`<div class="week-col">
      <div class="week-col-head${isToday?' today-col':''}">
        <div class="week-col-day">${DAYS[i].slice(0,3)}</div>
        <div class="week-col-date">${parseInt(ds.split('-')[2])} ${SMON[d.getMonth()]}</div>
      </div>`;
    if(!dayTodos.length&&!dayMtgs.length){
      h+=`<div class="week-empty">—</div>`;
    }
    dayMtgs.forEach(m=>{
      const info=SECS[m.section];
      h+=`<div class="week-mtg"><div class="week-mtg-time">${m.time||'--:--'}</div><div style="flex:1;font-size:13px">${esc(m.title)}</div><span class="cal-dot ${info.dot}"></span></div>`;
    });
    dayTodos.forEach(t=>{
      const info=SECS[t.section];
      const lc=getLabelColor(t.label);
      h+=`<div class="week-item${t.done?' done-item':''}" data-id="${t.id}">
        ${lc?`<span class="clabel" style="background:${lc}"></span>`:`<span class="week-item-dot" style="background:${info.color}"></span>`}
        <span style="flex:1">${esc(t.text)}</span>
        <span class="pri-badge pri-badge-${t.priority||'medium'}" style="font-size:10px">${cap(t.priority||'medium')[0]}</span>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  ca.innerHTML=h;
  document.getElementById('weekPrev').addEventListener('click',()=>{S.weekOffset--;render();});
  document.getElementById('weekNext').addEventListener('click',()=>{S.weekOffset++;render();});
  document.getElementById('weekToday').addEventListener('click',()=>{S.weekOffset=0;render();});
  ca.querySelectorAll('.week-item[data-id]').forEach(el=>{
    el.addEventListener('click',()=>openEditModal(el.dataset.id));
    el.addEventListener('contextmenu',e=>{e.preventDefault();showCtx({clientX:e.clientX,clientY:e.clientY},el.dataset.id);});
    addLongPress(el,coords=>{el.dataset.lp='1';showCtx(coords,el.dataset.id);});
  });
}

/* ══════════════════════════════════════
   CONTEXT MENU + LONG PRESS
══════════════════════════════════════ */
function addLongPress(el,cb){
  let timer=null,moved=false;
  const start=e=>{moved=false;timer=setTimeout(()=>{if(!moved){const c=e.touches?{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}:{clientX:e.clientX,clientY:e.clientY};cb(c);}},500);};
  const cancel=()=>{clearTimeout(timer);timer=null;};
  const move=()=>{moved=true;clearTimeout(timer);};
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',move,{passive:true});
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mousemove',move);
}

let activeCtxId=null;
function showCtx(coords,id){
  closeCtx();activeCtxId=id;
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const menu=document.createElement('div');
  menu.className='ctx-menu';menu.id='ctxMenu';
  menu.innerHTML=`
    <div class="ctx-item success" id="ctx-done">✓ ${t.done?'Mark active':'Mark done'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-edit">✎ Edit task</div>
    <div class="ctx-item ai" id="ctx-ai">✦ AI breakdown</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="ctx-del">✕ Delete</div>`;
  document.body.appendChild(menu);
  const vw=window.innerWidth,vh=window.innerHeight;
  let x=coords.clientX,y=coords.clientY;
  if(x+210>vw)x=vw-216;if(y+160>vh)y=vh-166;if(x<8)x=8;if(y<8)y=8;
  menu.style.left=x+'px';menu.style.top=y+'px';
  if(navigator.vibrate)navigator.vibrate(40);
  document.getElementById('ctx-done').addEventListener('click',()=>{toggleDone(id);closeCtx();});
  document.getElementById('ctx-edit').addEventListener('click',()=>{openEditModal(id);closeCtx();});
  document.getElementById('ctx-ai').addEventListener('click',()=>{openEditModal(id,'ai');closeCtx();});
  document.getElementById('ctx-del').addEventListener('click',()=>{closeCtx();confirmDelete(id);});
}
function closeCtx(){const m=document.getElementById('ctxMenu');if(m)m.remove();activeCtxId=null;}
document.addEventListener('click',closeCtx);
document.addEventListener('touchstart',e=>{if(!e.target.closest('#ctxMenu'))closeCtx();},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCtx();closeMiniCal();}});

/* ══════════════════════════════════════
   EDIT MODAL
══════════════════════════════════════ */
let editingId=null;
function openEditModal(id,mode){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('editText').value=t.text;
  document.getElementById('editNote').value=t.note||'';
  document.getElementById('editLink').value=t.link||'';
  document.getElementById('editDue').value=t.due||'';
  document.getElementById('editSection').value=t.section;
  document.getElementById('editRecur').value=t.recur||'';
  // priority
  document.querySelectorAll('#editPriRow .pri-box').forEach(b=>b.classList.toggle('sel',b.dataset.p===(t.priority||'medium')));
  // label picker
  const lp=document.getElementById('editLabelPicker');
  lp.innerHTML=COLOR_LABELS.map(c=>
    `<div class="label-opt${t.label===c.id?' sel':''}" data-lid="${c.id}" title="${c.label}" style="background:${c.color||'transparent'};border:2px solid ${c.color||'var(--border2)'}"></div>`
  ).join('');
  lp.querySelectorAll('.label-opt').forEach(o=>o.addEventListener('click',()=>{lp.querySelectorAll('.label-opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');}));
  // subtasks
  renderSubtaskEditor(t.subtasks||[]);
  // ai result
  document.getElementById('aiResult').innerHTML='';
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('editText').focus(),200);
  if(mode==='ai') setTimeout(()=>runAIBreakdown(id),300);
}

function renderSubtaskEditor(subtasks){
  const list=document.getElementById('subtaskEditList');
  list.innerHTML=subtasks.map((s,i)=>`
    <div class="subtask-edit-row" data-si="${i}">
      <input class="subtask-edit-input" value="${esc(s.text)}" placeholder="Sub-task…" data-si="${i}" />
      <button class="subtask-del-btn" data-si="${i}">×</button>
    </div>`).join('');
  list.querySelectorAll('.subtask-del-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=S.todos.find(x=>x.id===editingId);if(!t)return;
      t.subtasks.splice(parseInt(btn.dataset.si),1);
      renderSubtaskEditor(t.subtasks);
    });
  });
}

document.getElementById('btnAddSubtask').addEventListener('click',()=>{
  const t=S.todos.find(x=>x.id===editingId);if(!t)return;
  t.subtasks.push({id:uid(),text:'',done:false});
  renderSubtaskEditor(t.subtasks);
  // focus last input
  const inputs=document.querySelectorAll('.subtask-edit-input');
  if(inputs.length)inputs[inputs.length-1].focus();
});

document.getElementById('editCancel').addEventListener('click',()=>document.getElementById('editOverlay').classList.remove('open'));
document.getElementById('editOverlay').addEventListener('click',e=>{if(e.target.id==='editOverlay')document.getElementById('editOverlay').classList.remove('open');});
document.querySelectorAll('#editPriRow .pri-box').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#editPriRow .pri-box').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});});
document.getElementById('editSave').addEventListener('click',()=>{
  const t=S.todos.find(x=>x.id===editingId);if(!t)return;
  t.text=document.getElementById('editText').value.trim()||t.text;
  t.note=document.getElementById('editNote').value.trim();
  t.link=document.getElementById('editLink').value.trim();
  t.due=document.getElementById('editDue').value||null;
  t.section=document.getElementById('editSection').value;
  t.recur=document.getElementById('editRecur').value;
  const sp=document.querySelector('#editPriRow .pri-box.sel');if(sp)t.priority=sp.dataset.p;
  const sl=document.querySelector('#editLabelPicker .label-opt.sel');if(sl)t.label=sl.dataset.lid;
  // save subtask texts
  document.querySelectorAll('.subtask-edit-input').forEach((inp,i)=>{if(t.subtasks[i])t.subtasks[i].text=inp.value.trim();});
  t.subtasks=t.subtasks.filter(s=>s.text);
  save();document.getElementById('editOverlay').classList.remove('open');render();
});
document.getElementById('editText').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('editSave').click();});

/* ══════════════════════════════════════
   AI BREAKDOWN
══════════════════════════════════════ */
async function runAIBreakdown(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const res=document.getElementById('aiResult');
  res.innerHTML=`<div class="ai-loading">✦ Claude is breaking this down…</div>`;
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:`Break down this task into 3-6 concrete, actionable sub-tasks. Reply ONLY with a JSON array of strings, no markdown, no explanation. Task: "${t.text}"`}]
      })
    });
    const data=await response.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'[]';
    const subtasks=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(!Array.isArray(subtasks)||!subtasks.length){res.innerHTML='<div style="color:var(--danger);font-size:13px;">Could not parse response.</div>';return;}
    let h=`<div class="ai-result"><div class="ai-result-title">✦ Suggested sub-tasks — select to add:</div>`;
    subtasks.forEach((s,i)=>`${h+=`<div class="ai-subtask-item"><div class="ai-subtask-check sel" data-i="${i}"></div><span>${esc(s)}</span></div>`;}`);
    h+=`<button class="btn-ai-apply" id="btnAiApply">Add selected sub-tasks</button></div>`;
    res.innerHTML=h;
    res.querySelectorAll('.ai-subtask-check').forEach(chk=>{
      chk.addEventListener('click',()=>chk.classList.toggle('sel'));
    });
    document.getElementById('btnAiApply').addEventListener('click',()=>{
      const t2=S.todos.find(x=>x.id===editingId);if(!t2)return;
      res.querySelectorAll('.ai-subtask-check.sel').forEach((chk,i)=>{
        const text=subtasks[parseInt(chk.dataset.i)];
        if(text&&!t2.subtasks.find(s=>s.text===text)) t2.subtasks.push({id:uid(),text,done:false});
      });
      renderSubtaskEditor(t2.subtasks);
      res.innerHTML='<div style="color:var(--success);font-size:13px;padding:8px 0;">✓ Sub-tasks added!</div>';
    });
  }catch(e){res.innerHTML=`<div style="color:var(--danger);font-size:13px;padding:8px 0;">Error: ${e.message}</div>`;}
}

/* ══════════════════════════════════════
   CONFIRM DELETE
══════════════════════════════════════ */
let pendingDelId=null;
function confirmDelete(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  pendingDelId=id;
  document.getElementById('confirmMsg').textContent=`"${t.text.slice(0,60)}" will be permanently deleted.`;
  document.getElementById('confirmOverlay').classList.add('open');
}
document.getElementById('confirmNo').addEventListener('click',()=>{document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;});
document.getElementById('confirmYes').addEventListener('click',()=>{
  if(pendingDelId){S.todos=S.todos.filter(x=>x.id!==pendingDelId);save();}
  document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;render();
});
document.getElementById('confirmOverlay').addEventListener('click',e=>{if(e.target.id==='confirmOverlay'){document.getElementById('confirmOverlay').classList.remove('open');pendingDelId=null;}});

let pendingMtgId=null;
document.getElementById('confirmMtgNo').addEventListener('click',()=>{document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;});
document.getElementById('confirmMtgYes').addEventListener('click',()=>{
  if(pendingMtgId){S.meetings=S.meetings.filter(m=>m.id!==pendingMtgId);save();}
  document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;render();
});

/* ══════════════════════════════════════
   MINI CALENDAR
══════════════════════════════════════ */
let mcCb=null,mcDate=null,mcMo=null,mcYr=null;
function showMiniCal(anchor,current,cb){
  closeMiniCal();mcCb=cb;
  const d=current?new Date(current+' 00:00'):new Date();
  mcMo=d.getMonth();mcYr=d.getFullYear();mcDate=current||todayStr();
  renderMiniCal(anchor);
}
function renderMiniCal(anchor){
  const old=document.getElementById('miniCal');if(old)old.remove();
  const cal=document.createElement('div');cal.className='mini-cal';cal.id='miniCal';
  cal.innerHTML=buildMiniCalHTML();
  document.body.appendChild(cal);
  const rect=anchor.getBoundingClientRect();
  let top=rect.bottom+6,left=rect.left;
  if(left+270>window.innerWidth)left=window.innerWidth-270;
  if(top+290>window.innerHeight)top=rect.top-295;
  if(top<8)top=8;
  cal.style.top=top+'px';cal.style.left=left+'px';
  cal.querySelector('#mcPrev').addEventListener('click',e=>{e.stopPropagation();mcMo--;if(mcMo<0){mcMo=11;mcYr--;}renderMiniCal(anchor);});
  cal.querySelector('#mcNext').addEventListener('click',e=>{e.stopPropagation();mcMo++;if(mcMo>11){mcMo=0;mcYr++;}renderMiniCal(anchor);});
  cal.querySelectorAll('.mini-cal-day[data-date]').forEach(d=>{
    d.addEventListener('click',e=>{e.stopPropagation();mcDate=d.dataset.date;if(mcCb)mcCb(d.dataset.date);closeMiniCal();});
  });
  cal.addEventListener('click',e=>e.stopPropagation());
}
function buildMiniCalHTML(){
  const yr=mcYr,mo=mcMo,today=todayStr();
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  const start=fd===0?6:fd-1;
  let h=`<div class="mini-cal-header"><button class="mini-cal-nav" id="mcPrev">‹</button><span class="mini-cal-title">${MONTHS[mo]} ${yr}</span><button class="mini-cal-nav" id="mcNext">›</button></div><div class="mini-cal-grid">`;
  ['M','T','W','T','F','S','S'].forEach(d=>{h+=`<div class="mini-cal-dname">${d}</div>`;});
  for(let i=start-1;i>=0;i--)h+=`<div class="mini-cal-day other-d">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${p2(mo+1)}-${p2(d)}`;
    h+=`<div class="mini-cal-day${ds===today?' today-d':''}${ds===mcDate?' sel-d':''}" data-date="${ds}">${d}</div>`;
  }
  const rem=(start+dim)%7===0?0:7-(start+dim)%7;
  for(let d=1;d<=rem;d++)h+=`<div class="mini-cal-day other-d">${d}</div>`;
  return h+`</div>`;
}
function closeMiniCal(){const c=document.getElementById('miniCal');if(c)c.remove();}
document.addEventListener('click',closeMiniCal);

/* ══════════════════════════════════════
   CALENDAR PAGE
══════════════════════════════════════ */
function renderCalendar(ca){
  const yr=S.calYear,mo=S.calMonth,today=new Date();
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  const start=fd===0?6:fd-1;
  const monthMtgs=S.meetings.filter(m=>{const d=new Date(m.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const dayMap={};
  monthMtgs.forEach(m=>{const d=parseInt(m.date.split('-')[2]);if(!dayMap[d])dayMap[d]=[];dayMap[d].push(m.section);});

  let grid=`<div class="cal-panel">
    <div class="calendar-header">
      <div class="cal-month-label">${MONTHS[mo]} ${yr}</div>
      <div class="cal-nav"><button class="btn-icon" id="calPrev">‹</button><button class="btn-icon" id="calNext">›</button></div>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header">${['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
      <div class="cal-days">`;

  for(let i=start-1;i>=0;i--){const pm=mo===0?11:mo-1,py=mo===0?yr-1:yr,day=dip-i,ds=`${py}-${p2(pm+1)}-${p2(day)}`;grid+=`<div class="cal-day other-month past" data-date="${ds}"><div class="cal-day-num" style="color:var(--text3)">${day}</div></div>`;}

  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${p2(mo+1)}-${p2(d)}`;
    const isT=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
    const isPast=ds<todayStr()&&!isT;
    const isSel=S.calSelected===ds;
    const dots=(dayMap[d]||[]).slice(0,4).map(s=>`<div class="cal-dot ${SECS[s].dot}"></div>`).join('');
    grid+=`<div class="cal-day${isT?' today':''}${isSel?' selected':''}${isPast?' past':''}" data-date="${ds}"><div class="cal-day-num">${d}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }

  const rem=(start+dim)%7===0?0:7-(start+dim)%7;
  for(let d=1;d<=rem;d++){const nm=mo===11?0:mo+1,ny=mo===11?yr+1:yr,ds=`${ny}-${p2(nm+1)}-${p2(d)}`;const isPast=ds<todayStr();const isSel=S.calSelected===ds;const dots=S.meetings.filter(m=>m.date===ds).slice(0,4).map(m=>`<div class="cal-dot ${SECS[m.section].dot}"></div>`).join('');grid+=`<div class="cal-day other-month${isPast?' past':''}${isSel?' selected':''}" data-date="${ds}"><div class="cal-day-num" style="color:var(--text3)">${d}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;}

  grid+=`</div></div><p class="cal-hint">Single-click to filter · Double-click to add meeting</p></div>`;

  const disp=S.calSelected?S.meetings.filter(m=>m.date===S.calSelected).sort((a,b)=>a.time.localeCompare(b.time)):monthMtgs.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  const ptitle=S.calSelected?`Meetings · ${fmtDate(S.calSelected)}`:`All meetings · ${MONTHS[mo]}`;

  let mp=`<div>`;
  if(S.quickMeeting){
    mp+=`<div class="quick-meeting"><h3>New meeting — ${fmtDate(S.quickMeeting)}</h3>
      <div class="qm-row"><input id="qmTitle" class="qm-input" placeholder="Meeting title" style="flex:2;min-width:160px" /></div>
      <div class="qm-row">
        <input id="qmDate" type="date" class="qm-input" value="${S.quickMeeting}" min="${todayStr()}" />
        <div class="time-picker">
          <select id="qmHour" class="qm-input time-sel"><option value="">HH</option>${Array.from({length:24},(_,i)=>`<option value="${p2(i)}">${p2(i)}</option>`).join('')}</select>
          <span class="time-colon">:</span>
          <select id="qmMin" class="qm-input time-sel"><option value="">MM</option>${['00','15','30','45'].map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
        </div>
        <select id="qmSec" class="qm-input">${Object.entries(SECS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select>
      </div>
      <div class="qm-row"><input id="qmNotes" class="qm-input" placeholder="Notes (optional)" /></div>
      <div class="qm-actions"><button class="btn-cancel-qm" id="qmCancel">Cancel</button><button class="btn-save-mtg" id="qmSave">Save meeting</button></div>
    </div>`;
  }
  mp+=`<div class="meetings-panel-title">${ptitle}<span class="count-badge">${disp.length}</span>${S.calSelected?`<button class="filter-btn" id="clearSel" style="padding:2px 8px;font-size:11px">Clear</button>`:''}</div>`;
  if(!disp.length&&!S.quickMeeting) mp+=`<div class="empty-state" style="padding:24px 0">Double-click any day to add a meeting</div>`;
  disp.forEach(m=>{const info=SECS[m.section];mp+=`<div class="meeting-item"><div class="meeting-time">${m.time||'--:--'}</div><div class="meeting-body"><div class="meeting-title">${esc(m.title)}</div><div class="meeting-sub"><span>${fmtDate(m.date)}</span>${m.notes?`<span>· ${esc(m.notes)}</span>`:''}<span class="tag ${info.tag}" style="padding:1px 6px;font-size:10px">${info.label}</span></div></div><button class="meeting-del" data-id="${m.id}">×</button></div>`;});
  mp+=`</div>`;

  ca.innerHTML=`<div class="cal-layout">${grid}${mp}</div>`;

  document.getElementById('calPrev').addEventListener('click',()=>{S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}S.calSelected=null;S.quickMeeting=null;render();});
  document.getElementById('calNext').addEventListener('click',()=>{S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}S.calSelected=null;S.quickMeeting=null;render();});
  ca.querySelectorAll('.cal-day:not(.past)').forEach(day=>{
    day.addEventListener('click',()=>{if(!day.dataset.date)return;const d=day.dataset.date;S.calSelected=S.calSelected===d?null:d;S.quickMeeting=null;render();});
    day.addEventListener('dblclick',()=>{if(!day.dataset.date)return;S.calSelected=day.dataset.date;S.quickMeeting=day.dataset.date;render();setTimeout(()=>{const el=document.getElementById('qmTitle');if(el)el.focus();},30);});
  });
  document.getElementById('clearSel')?.addEventListener('click',()=>{S.calSelected=null;S.quickMeeting=null;render();});
  ca.querySelectorAll('.meeting-del').forEach(btn=>{btn.addEventListener('click',()=>{pendingMtgId=btn.dataset.id;document.getElementById('confirmMtgOverlay').classList.add('open');});});
  document.getElementById('confirmMtgOverlay').addEventListener('click',e=>{if(e.target.id==='confirmMtgOverlay'){document.getElementById('confirmMtgOverlay').classList.remove('open');pendingMtgId=null;}});
  document.getElementById('qmCancel')?.addEventListener('click',()=>{S.quickMeeting=null;render();});
  document.getElementById('qmSave')?.addEventListener('click',()=>{
    const title=document.getElementById('qmTitle').value.trim(),date=document.getElementById('qmDate').value;
    if(!title||!date){document.getElementById('qmTitle').focus();return;}
    const h=document.getElementById('qmHour').value,m=document.getElementById('qmMin').value;
    S.meetings.push({id:uid(),title,date,time:(h&&m)?`${h}:${m}`:'',section:document.getElementById('qmSec').value,notes:document.getElementById('qmNotes').value.trim()});
    S.quickMeeting=null;save();render();
  });
  document.getElementById('qmTitle')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('qmSave').click();if(e.key==='Escape'){S.quickMeeting=null;render();}});
}

/* ══ INIT ══ */
render();
</script>
