<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AZ Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#eeede8;--surface3:#e6e4de;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --text:#1a1916;--text2:#6b6a65;--text3:#a09f9a;
  --accent:#2563eb;--accent-soft:#eff6ff;
  --danger:#dc2626;--danger-soft:#fef2f2;
  --success:#16a34a;--success-soft:#f0fdf4;
  --warning:#d97706;--warning-soft:#fffbeb;
  --purple:#7c3aed;--purple-soft:#f5f3ff;
  --pri-low:#2563eb;--pri-low-soft:#dbeafe;--pri-low-border:#93c5fd;
  --pri-med:#d97706;--pri-med-soft:#fef3c7;--pri-med-border:#fcd34d;
  --pri-high:#dc2626;--pri-high-soft:#fee2e2;--pri-high-border:#fca5a5;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1c1b19;--surface2:#242321;--surface3:#2e2d2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0efe9;--text2:#9e9d98;--text3:#6b6a65;
  --accent:#3b82f6;--accent-soft:#1e3a5f;
  --danger:#f87171;--danger-soft:#3b1c1c;
  --success:#4ade80;--success-soft:#14291e;
  --warning:#fbbf24;--warning-soft:#2d2009;
  --purple:#a78bfa;--purple-soft:#2d1f4a;
  --pri-low:#3b82f6;--pri-low-soft:#1e3a5f;--pri-low-border:#1d4ed8;
  --pri-med:#f59e0b;--pri-med-soft:#2d2009;--pri-med-border:#b45309;
  --pri-high:#f87171;--pri-high-soft:#3b1c1c;--pri-high-border:#991b1b;
  --shadow:0 1px 3px rgba(0,0,0,.4);--shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;}
.shell{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.header{position:sticky;top:0;z-index:300;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;gap:12px;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.header-right{display:flex;gap:6px;align-items:center;}
.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;}
.btn-icon:hover{background:var(--border2);color:var(--text);}
.btn-sync{display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-sync:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.btn-sync.ok .sync-dot{background:var(--success);}
.btn-sync.err .sync-dot{background:var(--danger);}
.btn-sync.syncing .sync-dot{background:var(--warning);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 6px;flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{padding:10px 13px;border:none;background:none;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-tab:hover:not(.active){color:var(--text);}

/* CONTENT */
.content-area{flex:1;padding:16px;width:100%;}
.content-area.week-view{max-width:100%!important;padding:16px 20px;}
.content-area.all-view{max-width:100%!important;padding:16px 20px;}
@media(min-width:900px){
  .content-area{padding:20px 24px;max-width:100%;}
  .content-area.week-view{padding:20px 24px;}
  .cal-layout{display:grid;grid-template-columns:420px 1fr;gap:28px;align-items:start;}
  .week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;}
}
@media(min-width:1280px){
  .cal-layout{grid-template-columns:480px 1fr;}
  .content-area.single-ws{max-width:600px;}
  .week-grid{gap:10px;}
}
@media(min-width:1600px){.content-area.single-ws{max-width:680px;}}

/* TODOS GRID — horizontal scroll single row */
.todos-grid{
  display:flex;
  flex-direction:row;
  gap:16px;
  overflow-x:auto;
  align-items:start;
  padding-bottom:12px;
  scrollbar-width:thin;
}
.todos-grid::-webkit-scrollbar{height:5px;}
.todos-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.todos-grid .section-block{
  flex:0 0 260px;
  min-width:260px;
  margin-bottom:0;
}
@media(min-width:1280px){
  .todos-grid .section-block{flex:0 0 280px;min-width:280px;}
}

/* TOOLS DROPDOWN */
.tools-wrap{position:relative;}
.tools-menu{position:absolute;top:38px;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:6px;min-width:180px;z-index:400;animation:fadeIn .12s ease;display:none;}
.tools-menu.open{display:block;}
.tools-item{padding:9px 14px;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);transition:background .1s;white-space:nowrap;border:none;background:none;width:100%;font-family:inherit;text-align:left;}
.tools-item:hover{background:var(--surface2);}
.tools-sep{height:1px;background:var(--border);margin:4px 6px;}

/* POMODORO */
.pomo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.pomo-box{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:340px;padding:28px 24px;text-align:center;animation:fadeIn .2s ease;}
.pomo-title{font-size:14px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.pomo-task{font-size:14px;color:var(--text2);margin-bottom:20px;min-height:20px;}
.pomo-ring{position:relative;width:160px;height:160px;margin:0 auto 20px;}
.pomo-svg{transform:rotate(-90deg);}
.pomo-track{fill:none;stroke:var(--surface2);stroke-width:10;}
.pomo-progress{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s linear;}
.pomo-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);}
.pomo-mode-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
.pomo-mode-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.pomo-mode-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.pomo-controls{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.pomo-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pomo-btn.play{background:var(--accent);color:white;}
.pomo-btn.play:hover{opacity:.88;}
.pomo-btn.reset{background:var(--surface2);color:var(--text2);}
.pomo-btn.reset:hover{background:var(--surface3);}
.pomo-task-label{font-size:12px;color:var(--text3);margin-bottom:6px;}
.pomo-task-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;margin-bottom:16px;}
.pomo-close{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-decoration:underline;}
.pomo-sessions{font-size:12px;color:var(--text3);margin-top:8px;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:3px;background:var(--surface2);border-radius:8px;padding:3px;}
.view-btn{padding:4px 10px;border-radius:6px;border:none;background:none;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}

/* LIST VIEW (All tab) */
.list-view-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);}
.list-view-table thead th{padding:9px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;}
.list-view-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.list-view-table tbody tr:last-child{border-bottom:none;}
.list-view-table tbody tr:hover{background:var(--surface2);}
.list-view-table tbody tr.done-row{opacity:.5;}
.list-view-table tbody tr.done-row .lv-text{text-decoration:line-through;color:var(--text3);}
.list-view-table td{padding:9px 14px;font-size:13px;vertical-align:middle;}
.lv-text{font-weight:500;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lv-ws-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* KANBAN CARDS (workspace kanban view) */
.kanban-columns{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:start;scrollbar-width:thin;}
.kanban-col{flex:0 0 220px;min-width:220px;display:flex;flex-direction:column;gap:0;}
.kanban-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:6px 4px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kanban-col-head .count-badge{font-size:10px;}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .15s,transform .1s;position:relative;}
.kanban-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kanban-card.pri-high{border-left:3px solid var(--pri-high);}
.kanban-card.pri-medium{border-left:3px solid var(--pri-med);}
.kanban-card.pri-low{border-left:3px solid var(--pri-low);}
.kanban-card-title{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:6px;color:var(--text);}
.kanban-card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.kanban-add-col{background:var(--surface2);border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:10px 12px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;margin-bottom:8px;}
.kanban-add-col:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* DRAG OVER SECTION (cross-space) */
.section-block.drop-target{outline:2px dashed var(--accent);outline-offset:-2px;}


/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600;}
.tag-perso{background:var(--purple-soft);color:var(--purple);}
.tag-pro{background:var(--accent-soft);color:var(--accent);}
.tag-brainlabs{background:var(--success-soft);color:var(--success);}
.tag-easyparts{background:var(--warning-soft);color:var(--warning);}

/* COLOR LABELS */
.clabel{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* SECTION BLOCK */
.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
@media(min-width:900px){.section-block{margin-bottom:0;}}
.accent-bar-perso{border-top:3px solid var(--purple);}
.accent-bar-pro{border-top:3px solid var(--accent);}
.accent-bar-brainlabs{border-top:3px solid var(--success);}
.accent-bar-easyparts{border-top:3px solid var(--warning);}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px;}
.section-label{font-size:16px;font-weight:700;color:var(--text);}
.count-badge{background:var(--surface);color:var(--text3);font-size:12px;padding:2px 8px;border-radius:20px;border:1px solid var(--border2);}

/* TODO ITEMS */
.todo-list{display:flex;flex-direction:column;}
.todo-item{padding:10px 16px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);transition:background .1s,transform .1s;position:relative;overflow:hidden;touch-action:pan-y;}
.todo-item:last-child{border-bottom:none;}
.todo-item.done{opacity:.45;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text3);}
.todo-item.pri-low{border-left:3px solid var(--pri-low);}
.todo-item.pri-medium{border-left:3px solid var(--pri-med);}
.todo-item.pri-high{border-left:3px solid var(--pri-high);}
.todo-item.pri-low:not(.done){background:var(--pri-low-soft);}
.todo-item.pri-medium:not(.done){background:var(--pri-med-soft);}
.todo-item.pri-high:not(.done){background:var(--pri-high-soft);}
.todo-item{cursor:grab;}
.todo-item:active{cursor:grabbing;transform:scale(.99);}
.todo-item.dragging{opacity:.35;background:var(--surface3)!important;}
.todo-item.drag-over-top{border-top:2px solid var(--accent)!important;}
.todo-item.drag-over-bot{border-bottom:2px solid var(--accent)!important;}

/* SWIPE FEEDBACK */
.todo-item.swipe-right{background:var(--success-soft)!important;}
.todo-item.swipe-left{background:var(--danger-soft)!important;}
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;opacity:0;transition:opacity .15s;}
.swipe-hint-right{left:12px;}
.swipe-hint-left{right:12px;}
.todo-item.swipe-right .swipe-hint-right,.todo-item.swipe-left .swipe-hint-left{opacity:1;}

/* TODO DELETE BUTTON */
.todo-del-btn{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text3);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,background .15s,color .15s;flex-shrink:0;padding:0;}
.todo-item:hover .todo-del-btn{opacity:1;}
.todo-del-btn:hover{background:var(--danger-soft);color:var(--danger);opacity:1;}
.drag-handle{width:18px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:2px 0;opacity:.25;transition:opacity .15s;pointer-events:none;}
.drag-handle span{display:block;width:12px;height:2px;border-radius:2px;background:var(--text2);}
.todo-item:hover .drag-handle{opacity:.6;}

.todo-body{flex:1;min-width:0;}
.todo-text{font-size:15px;line-height:1.45;color:var(--text);font-weight:500;}
.todo-note-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.todo-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.todo-date.ov{color:var(--danger);font-weight:600;}
.todo-link{font-size:12px;color:var(--accent);text-decoration:none;}
.todo-link:hover{text-decoration:underline;}
.pri-badge{font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;}
.pri-badge-low{background:var(--pri-low-soft);color:var(--pri-low);border:1px solid var(--pri-low-border);}
.pri-badge-medium{background:var(--pri-med-soft);color:var(--pri-med);border:1px solid var(--pri-med-border);}
.pri-badge-high{background:var(--pri-high-soft);color:var(--pri-high);border:1px solid var(--pri-high-border);}
.recur-badge{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;}

/* SUBTASKS */
.subtasks-wrap{margin-top:6px;}
.subtask-progress{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.subtask-progress-bar{height:100%;background:var(--success);border-radius:2px;transition:width .3s;}
.subtask-list{display:flex;flex-direction:column;gap:3px;}
.subtask-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface);}
.subtask-check.done{background:var(--success);border-color:var(--success);}
.subtask-check.done::after{content:'✓';color:white;font-size:9px;font-weight:700;}
.subtask-text.done{text-decoration:line-through;color:var(--text3);}

/* INLINE ADD */
.inline-add{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;border-top:1px solid var(--border);}
.inline-add:hover{background:var(--surface2);}
.add-plus{width:18px;height:18px;border-radius:4px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0;}
.add-prompt{font-size:14px;color:var(--text3);}
.inline-input-wrap{padding:12px 16px;border-top:2px solid var(--accent);background:var(--accent-soft);}
.inline-text-input{width:100%;border:none;background:none;font-family:inherit;font-size:15px;color:var(--text);outline:none;margin-bottom:10px;font-weight:500;}
.inline-text-input::placeholder{color:var(--text3);}
.inline-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pri-box{padding:5px 12px;border-radius:8px;border:2px solid transparent;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--surface);}
.pri-box.low{border-color:var(--pri-low-border);color:var(--pri-low);}
.pri-box.low.sel,.pri-box.low:hover{background:var(--pri-low);color:white;border-color:var(--pri-low);}
.pri-box.medium{border-color:var(--pri-med-border);color:var(--pri-med);}
.pri-box.medium.sel,.pri-box.medium:hover{background:var(--pri-med);color:white;border-color:var(--pri-med);}
.pri-box.high{border-color:var(--pri-high-border);color:var(--pri-high);}
.pri-box.high.sel,.pri-box.high:hover{background:var(--pri-high);color:white;border-color:var(--pri-high);}
.inline-date-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.inline-date-btn:hover,.inline-date-btn.has-date{border-color:var(--accent);color:var(--accent);}
.inline-save{padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;}
.inline-cancel{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.filter-btn:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* CONTEXT MENU */
.ctx-menu{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:4px;min-width:200px;animation:fadeIn .12s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:10px 14px;border-radius:7px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);transition:background .1s;white-space:nowrap;}
.ctx-item:hover{background:var(--surface2);}
.ctx-item.danger{color:var(--danger);}
.ctx-item.danger:hover{background:var(--danger-soft);}
.ctx-item.success{color:var(--success);}
.ctx-item.success:hover{background:var(--success-soft);}
.ctx-item.ai{color:var(--purple);}
.ctx-item.ai:hover{background:var(--purple-soft);}
.ctx-sep{height:1px;background:var(--border);margin:3px 6px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:500px;padding:24px;transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-family:inherit;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.5;}
.pri-row{display:flex;gap:8px;flex-wrap:wrap;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:11px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;}
.btn-cancel:hover{background:var(--surface3);}
.btn-confirm{flex:2;padding:11px;border-radius:9px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{opacity:.88;}
.confirm-box{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:360px;padding:24px;transform:translateY(10px);transition:transform .2s;}
.overlay.open .confirm-box{transform:translateY(0);}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.confirm-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-actions{display:flex;gap:10px;}
.btn-confirm-del{flex:1;padding:10px;border-radius:9px;border:none;background:var(--danger);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}

/* SUBTASK EDIT in modal */
.subtask-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.subtask-edit-row{display:flex;align-items:center;gap:8px;}
.subtask-edit-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:14px;color:var(--text);outline:none;}
.subtask-edit-input:focus{border-color:var(--accent);}
.subtask-del-btn{width:26px;height:26px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.subtask-del-btn:hover{background:var(--danger-soft);color:var(--danger);}
.btn-add-subtask{background:none;border:1px dashed var(--border2);border-radius:7px;padding:6px 12px;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;width:100%;text-align:left;transition:all .15s;}
.btn-add-subtask:hover{border-color:var(--accent);color:var(--accent);}

/* COLOR LABEL PICKER */
.label-picker{display:flex;gap:8px;flex-wrap:wrap;}
.label-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s;}
.label-opt:hover{transform:scale(1.15);}
.label-opt.sel{border-color:var(--text);}

/* AI BREAKDOWN */
.ai-result{background:var(--purple-soft);border:1px solid var(--purple);border-radius:var(--radius);padding:12px 14px;margin-top:10px;}
.ai-result-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;}
.ai-subtask-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:var(--text);}
.ai-subtask-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--purple);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface);}
.ai-subtask-check.sel{background:var(--purple);border-color:var(--purple);}
.ai-subtask-check.sel::after{content:'✓';color:white;font-size:9px;font-weight:700;}
.btn-ai-apply{background:var(--purple);color:white;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;width:100%;}
.ai-loading{text-align:center;padding:16px;color:var(--purple);font-size:14px;}

/* MINI CALENDAR */
.mini-cal{position:fixed;z-index:9000;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:14px;width:260px;animation:fadeIn .15s ease;}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mini-cal-title{font-size:14px;font-weight:700;}
.mini-cal-nav{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:5px;}
.mini-cal-nav:hover{background:var(--surface2);}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-cal-dname{text-align:center;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:3px 0;}
.mini-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s;}
.mini-cal-day:hover:not(.other-d){background:var(--surface2);}
.mini-cal-day.today-d{font-weight:700;color:var(--accent);}
.mini-cal-day.sel-d{background:var(--accent)!important;color:white!important;border-radius:50%;}
.mini-cal-day.other-d{color:var(--text3);opacity:.4;cursor:default;}

/* EMPTY */
.empty-state{text-align:center;padding:20px 16px;color:var(--text3);font-size:14px;}

/* CALENDAR PAGE */
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month-label{font-size:20px;font-weight:700;}
.cal-nav{display:flex;gap:6px;}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-day-name{text-align:center;padding:8px 2px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover:not(.past){background:var(--surface2);}
.cal-day.past{pointer-events:none;opacity:.35;}
.cal-day.today .cal-day-num{background:var(--accent);color:white;font-weight:700;}
.cal-day.selected{background:var(--accent-soft);}
.cal-day-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);}
.cal-day.other-month .cal-day-num{color:var(--text3);}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.dot-perso{background:var(--purple);}
.dot-pro{background:var(--accent);}
.dot-brainlabs{background:var(--success);}
.dot-easyparts{background:var(--warning);}
.cal-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px;}
.meetings-panel-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.meeting-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;box-shadow:var(--shadow);}
.meeting-item:hover{border-color:var(--border2);}
.meeting-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:40px;padding-top:1px;}
.meeting-body{flex:1;min-width:0;}
.meeting-title{font-size:14px;color:var(--text);font-weight:600;}
.meeting-sub{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-family:'DM Mono',monospace;}
.meeting-del{width:24px;height:24px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;}
.meeting-item:hover .meeting-del{opacity:1;}
.meeting-del:hover{background:var(--danger-soft);color:var(--danger);}
.quick-meeting{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-md);}
.quick-meeting h3{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;}
.qm-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.qm-input{flex:1;min-width:100px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;}
.qm-input:focus{border-color:var(--accent);}
.qm-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn-save-mtg{background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 18px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel-qm{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:13px;cursor:pointer;}
.time-picker{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.time-sel{flex:1;min-width:60px;padding:7px 6px;text-align:center;}
.time-colon{font-weight:700;font-size:16px;color:var(--text2);}

/* WEEKLY VIEW */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.week-title{font-size:18px;font-weight:700;}
.week-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;}
.week-col-head{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.week-col-day{font-size:14px;font-weight:700;color:var(--text);}
.week-col-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.week-col-head.today-col{background:var(--accent-soft);}
.week-col-head.today-col .week-col-day{color:var(--accent);}
.week-item{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s;}
.week-item:last-child{border-bottom:none;}
.week-item:hover{background:var(--surface2);}
.week-item.done-item{opacity:.45;}
.week-item.done-item span{text-decoration:line-through;}
.week-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.week-mtg{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px;}
.week-mtg:last-child{border-bottom:none;}
.week-mtg-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);min-width:38px;}
.week-empty{padding:12px 14px;font-size:13px;color:var(--text3);text-align:center;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
@media(min-width:600px){.dash-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.dash-grid{grid-template-columns:repeat(6,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--shadow);transition:box-shadow .15s;}
.stat-card:hover{box-shadow:var(--shadow-md);}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.stat-card.red .stat-value{color:var(--danger);}
.stat-card.amber .stat-value{color:var(--warning);}
.stat-card.blue .stat-value{color:var(--accent);}
.stat-card.green .stat-value{color:var(--success);}
.stat-card.purple .stat-value{color:var(--purple);}
.dash-section{margin-bottom:8px;}
.dash-section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.acc-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;user-select:none;transition:background .15s;margin-bottom:2px;}
.acc-header:hover{background:var(--surface2);}
.acc-header.open{border-radius:var(--radius-lg) var(--radius-lg) 0 0;border-bottom-color:transparent;margin-bottom:0;}
.acc-icon{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.acc-header.open .acc-icon{transform:rotate(90deg);}
.acc-label{flex:1;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.acc-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow:hidden;margin-bottom:8px;}
.acc-body.hidden{display:none;}
.acc-empty{padding:12px 16px;font-size:13px;color:var(--text3);}
.dash-todo-row{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;}
.dash-todo-row:last-child{border-bottom:none;}
.dash-todo-row:hover{background:var(--surface2);}
.dash-todo-text{flex:1;font-size:14px;font-weight:500;}
.dash-todo-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dash-mtg-row{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.dash-mtg-row:last-child{border-bottom:none;}
.dash-mtg-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:44px;}

/* DAILY DIGEST */
.digest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.digest-box{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:24px;animation:fadeIn .2s ease;}
.digest-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.digest-date{font-size:13px;color:var(--text3);margin-bottom:20px;font-family:'DM Mono',monospace;}
.digest-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.digest-row:last-of-type{border-bottom:none;}
.digest-label{font-size:14px;color:var(--text2);}
.digest-num{font-size:22px;font-weight:700;}
.digest-num.red{color:var(--danger);}
.digest-num.amber{color:var(--warning);}
.digest-num.blue{color:var(--accent);}
.digest-num.purple{color:var(--purple);}
.digest-close{width:100%;margin-top:20px;padding:12px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* NOTIF PERMISSION */
.notif-bar{background:var(--purple-soft);border-bottom:1px solid var(--purple);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:var(--purple);}
.notif-bar-btn{background:var(--purple);color:white;border:none;border-radius:6px;padding:4px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* INTEGRATIONS PANEL */
.integrations-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px;box-shadow:var(--shadow);}
.integrations-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.integration-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.integration-row:last-child{border-bottom:none;padding-bottom:0;}
.integration-icon{font-size:22px;flex-shrink:0;}
.integration-info{flex:1;min-width:0;}
.integration-name{font-size:14px;font-weight:600;color:var(--text);}
.integration-desc{font-size:12px;color:var(--text3);margin-top:1px;}
.integration-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.integration-status.ok{background:var(--success-soft);color:var(--success);}
.integration-status.idle{background:var(--surface2);color:var(--text3);}
.integration-status.loading{background:var(--warning-soft);color:var(--warning);}
.integration-status.err{background:var(--danger-soft);color:var(--danger);}
.btn-sync-integration{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-sync-integration:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.btn-sync-integration:disabled{opacity:.5;cursor:not-allowed;}
.integration-log{margin-top:6px;font-size:12px;color:var(--text3);line-height:1.5;max-height:60px;overflow-y:auto;background:var(--surface2);border-radius:6px;padding:6px 10px;display:none;}
.integration-log.show{display:block;}

/* EMAIL INFO ITEMS */
.email-infos{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.email-infos-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.email-info-item{background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;border-left:3px solid var(--accent);}
.email-info-item:last-child{margin-bottom:0;}
.email-info-from{font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0;min-width:80px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.email-info-body{flex:1;min-width:0;}
.email-info-subject{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.email-info-summary{font-size:12px;color:var(--text2);margin-top:1px;line-height:1.3;}
.email-info-dismiss{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;}
.email-info-dismiss:hover{color:var(--danger);}

@media print{
  .header,.nav,.filter-bar,.inline-add,.btn-sync,.btn-icon,.ctx-menu,.integrations-panel{display:none!important;}
  .content-area{padding:0;max-width:100%!important;}
  .section-block{break-inside:avoid;box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>
<div class="shell">
  <div id="notifBar" style="display:none">
    <div class="notif-bar">
      <span>Enable notifications for meeting & due task reminders</span>
      <div style="display:flex;gap:6px;">
        <button class="notif-bar-btn" id="notifAllow">Enable</button>
        <button class="notif-bar-btn" style="background:transparent;color:var(--purple);border:1px solid var(--purple);" id="notifDismiss">Later</button>
      </div>
    </div>
  </div>
  <header class="header">
    <div class="logo" id="logoBtn" style="cursor:pointer;" title="Go to Dashboard">AZ <span>Todo</span></div>
    <div id="lastSyncLabel" style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:none;flex-direction:column;align-items:flex-end;line-height:1.3;">
      <span id="lastSyncDate"></span>
      <span id="lastSyncTime" style="color:var(--text2);font-weight:600;"></span>
    </div>

<script>
/* ══ WORKSPACE COLORS ══ */
const WS_COLORS=[
  {id:'purple', css:'var(--purple)',  soft:'var(--purple-soft)',  dot:'dot-perso'},
  {id:'blue',   css:'var(--accent)',  soft:'var(--accent-soft)',  dot:'dot-pro'},
  {id:'green',  css:'var(--success)', soft:'var(--success-soft)', dot:'dot-brainlabs'},
  {id:'amber',  css:'var(--warning)', soft:'var(--warning-soft)', dot:'dot-easyparts'},
  {id:'red',    css:'var(--danger)',  soft:'var(--danger-soft)',  dot:'dot-ws-red'},
  {id:'pink',   css:'#ec4899',        soft:'#fdf2f8',             dot:'dot-ws-pink'},
  {id:'teal',   css:'#0d9488',        soft:'#f0fdfa',             dot:'dot-ws-teal'},
  {id:'indigo', css:'#6366f1',        soft:'#eef2ff',             dot:'dot-ws-indigo'},
];

const DEFAULT_WS=[
  {id:'perso',     label:'Perso',     color:'purple'},
  {id:'pro',       label:'Pro',       color:'blue'},
  {id:'brainlabs', label:'Brainlabs', color:'green'},
  {id:'easyparts', label:'EasyParts', color:'amber'},
];

function getWsColor(colorId){return WS_COLORS.find(c=>c.id===colorId)||WS_COLORS[0];}

function wsInfo(ws){
  const c=getWsColor(ws.color);
  return {
    label: ws.label,
    tag:   `tag-ws-${ws.id}`,
    dot:   c.dot,
    bar:   `accent-bar-ws-${ws.id}`,
    color: c.css,
    soft:  c.soft,
  };
}

/* Build SECS-compatible object dynamically */
function getSECS(){
  const out={};
  (S.workspaces||DEFAULT_WS).forEach(ws=>{out[ws.id]=wsInfo(ws);});
  return out;
}
let SECS={}; // populated after load
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SMON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const COLOR_LABELS=[
  {id:'',color:'',label:'None'},
  {id:'red',color:'#ef4444',label:'Red'},
  {id:'orange',color:'#f97316',label:'Orange'},
  {id:'yellow',color:'#eab308',label:'Yellow'},
  {id:'green',color:'#22c55e',label:'Green'},
  {id:'blue',color:'#3b82f6',label:'Blue'},
  {id:'purple',color:'#a855f7',label:'Purple'},
  {id:'pink',color:'#ec4899',label:'Pink'},
  {id:'gray',color:'#6b7280',label:'Gray'},
];

/* ══ TRANSLATIONS ══ */
const T={
  en:{
    dashboard:'Dashboard', all:'All', week:'Week', calendar:'Calendar',
    activeTasks:'Active tasks', allSections:'all sections',
    dueToday:'Due today', dueTomorrow:'Due tomorrow', overdue:'Overdue',
    highPriority:'High priority', urgent:'urgent', meetingsToday:'Meetings today',
    pastDue:'past due', todaysMeetings:"Today's meetings", noMeetingsToday:'No meetings today',
    upcomingMeetings:'Upcoming meetings', noDue:'No due date',
    active:'Active', done:'Done',
    low:'Low', medium:'Medium', high:'High',
    addTask:'Click to add a task…', noTasks:'No tasks — click below to add one',
    pickDate:'Pick date', noRepeat:'No repeat', weekly:'↻ Weekly', monthly:'↻ Monthly',
    save:'Save', cancel:'Cancel', delete:'Delete',
    newMeeting:'New meeting', saveMeeting:'Save meeting',
    singleClick:'Single-click to filter · Double-click to add meeting',
    allMeetings:'All meetings', meetings:'Meetings',
    integrations:'Integrations', gmailTasks:'Gmail → Tasks & Info',
    gmailDesc:'Claude reads emails, creates tasks or flags info',
    gcalDesc:'Sync Google Calendar events',
    neverSynced:'Never synced', lastSync:'Last sync',
    sync:'Sync', syncing:'Syncing…', synced:'Synced', error:'Error', ready:'Ready',
    overdueSec:'Overdue', dueTodaySec:'Due today', dueTomorrowSec:'Due tomorrow',
    highPriSec:'High priority', medPriSec:'Medium priority', lowPriSec:'Low priority',
    language:'Language', settings:'Settings',
    workspaces:'Workspaces', newWorkspace:'New workspace', addWorkspace:'Add workspace',
    pomodoro:'Pomodoro timer', manageSpaces:'Manage spaces',
    exportPdf:'Export PDF', darkMode:'Dark mode', lightMode:'Light mode',
    backups:'Backups & restore', saveBackup:'📸 Save backup now', close:'Close',
    latestBackup:'Latest', restore:'Restore', noBackups:'No backups yet.',
    focusMode:'Focus 25', shortBreak:'Break 5', longBreak:'Long 15',
    noTask:'— No task —', sessionToday:'Sessions today',
    fyiGmail:'FYI from Gmail', dismiss:'Dismiss',
  },
  fr:{
    dashboard:'Tableau de bord', all:'Tout', week:'Semaine', calendar:'Calendrier',
    activeTasks:'Tâches actives', allSections:'toutes les sections',
    dueToday:"À faire aujourd'hui", dueTomorrow:'À faire demain', overdue:'En retard',
    highPriority:'Haute priorité', urgent:'urgent', meetingsToday:"Réunions aujourd'hui",
    pastDue:'dépassé', todaysMeetings:"Réunions aujourd'hui", noMeetingsToday:'Aucune réunion aujourd\'hui',
    upcomingMeetings:'Réunions à venir', noDue:'Pas de date limite',
    active:'Actives', done:'Terminées',
    low:'Basse', medium:'Moyenne', high:'Haute',
    addTask:'Cliquer pour ajouter une tâche…', noTasks:'Aucune tâche — cliquez ci-dessous',
    pickDate:'Choisir une date', noRepeat:'Sans répétition', weekly:'↻ Hebdo', monthly:'↻ Mensuel',
    save:'Enregistrer', cancel:'Annuler', delete:'Supprimer',
    newMeeting:'Nouvelle réunion', saveMeeting:'Enregistrer la réunion',
    singleClick:'Clic simple pour filtrer · Double-clic pour ajouter une réunion',
    allMeetings:'Toutes les réunions', meetings:'Réunions',
    integrations:'Intégrations', gmailTasks:'Gmail → Tâches & Infos',
    gmailDesc:'Claude lit les emails, crée des tâches ou signale des infos',
    gcalDesc:'Synchroniser Google Agenda',
    neverSynced:'Jamais synchronisé', lastSync:'Dernière sync',
    sync:'Sync', syncing:'Synchro…', synced:'Synchronisé', error:'Erreur', ready:'Prêt',
    overdueSec:'En retard', dueTodaySec:"À faire aujourd'hui", dueTomorrowSec:'À faire demain',
    highPriSec:'Haute priorité', medPriSec:'Priorité moyenne', lowPriSec:'Priorité basse',
    language:'Langue', settings:'Paramètres',
    workspaces:'Espaces de travail', newWorkspace:'Nouvel espace', addWorkspace:'Ajouter',
    pomodoro:'Minuteur Pomodoro', manageSpaces:'Gérer les espaces',
    exportPdf:'Exporter en PDF', darkMode:'Mode sombre', lightMode:'Mode clair',
    backups:'Sauvegardes & restauration', saveBackup:'📸 Sauvegarder maintenant', close:'Fermer',
    latestBackup:'Dernière', restore:'Restaurer', noBackups:'Aucune sauvegarde.',
    focusMode:'Focus 25', shortBreak:'Pause 5', longBreak:'Longue pause 15',
    noTask:'— Aucune tâche —', sessionToday:"Sessions aujourd'hui",
    fyiGmail:'Infos Gmail', dismiss:'Ignorer',
  }
};
function t(key){return (T[S.lang||'en']||T.en)[key]||key;}

/* ══ STATE ══ */
let S={
  theme:'light', lang:'en', tab:'dashboard', filter:'active',
  calMonth:new Date().getMonth(), calYear:new Date().getFullYear(),
  calSelected:null, quickMeeting:null,
  todos:[], meetings:[],
  inlineOpen:null, inlineState:{}, dashOpen:{},
  weekOffset:0,
  workspaces: JSON.parse(JSON.stringify(DEFAULT_WS)),
  viewAll:'kanban',    // 'kanban' | 'list'
  viewWs:'list',       // 'list' | 'kanban'
};

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('aztodo_v5')||'{}');
    ['theme','lang','todos','meetings','filter','workspaces','viewAll','viewWs'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    if(!S.workspaces||!S.workspaces.length) S.workspaces=JSON.parse(JSON.stringify(DEFAULT_WS));
    S.todos.forEach(t=>{
      if(!t.subtasks)t.subtasks=[];
      if(!t.label)t.label='';
      if(!t.recur)t.recur='';
      if(!t.note)t.note='';
      if(!t.link)t.link='';
      // migrate section ids: if section no longer exists, keep as-is
    });
  }catch(e){}
}

let _pushTimer=null;
function save(){
  localStorage.setItem('aztodo_v5',JSON.stringify({theme:S.theme,lang:S.lang,todos:S.todos,meetings:S.meetings,filter:S.filter,workspaces:S.workspaces,viewAll:S.viewAll,viewWs:S.viewWs}));
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>cloudPush(),1500);
}
load();
SECS=getSECS(); // build after load so custom workspaces are included

/* ══ DYNAMIC WORKSPACE CSS ══ */
function injectWsCSS(){
  let old=document.getElementById('ws-styles');if(old)old.remove();
  const style=document.createElement('style');style.id='ws-styles';
  let css='';
  (S.workspaces||[]).forEach(ws=>{
    const c=getWsColor(ws.color);
    css+=`.tag-ws-${ws.id}{background:${c.soft};color:${c.css};}`;
    css+=`.accent-bar-ws-${ws.id}{border-top:3px solid ${c.css};}`;
    css+=`.dot-ws-${ws.id}{background:${c.css};}`;
    // priority-like bg tints for todo items in this workspace — lighter approach
  });
  // extra dot classes
  css+=`.dot-ws-red{background:var(--danger);}`;
  css+=`.dot-ws-pink{background:#ec4899;}`;
  css+=`.dot-ws-teal{background:#0d9488;}`;
  css+=`.dot-ws-indigo{background:#6366f1;}`;
  style.textContent=css;
  document.head.appendChild(style);
}
injectWsCSS();

/* ══ DYNAMIC NAV ══ */
function rebuildNav(){
  SECS=getSECS();
  injectWsCSS();
  const nav=document.querySelector('.nav');
  nav.querySelectorAll('.nav-tab[data-ws]').forEach(t=>t.remove());
  // also remove any stale spaces tab
  nav.querySelectorAll('[data-tab="workspaces"]').forEach(t=>t.remove());
  const calTab=nav.querySelector('[data-tab="calendar"]');
  const weekTab=nav.querySelector('[data-tab="week"]');
  (S.workspaces||[]).forEach(ws=>{
    const btn=document.createElement('button');
    btn.className='nav-tab'+(S.tab===ws.id?' active':'');
    btn.dataset.tab=ws.id; btn.dataset.ws='1';
    btn.textContent=ws.label;
    btn.addEventListener('click',()=>{
      S.tab=ws.id;S.inlineOpen=null;S.quickMeeting=null;
      nav.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');render();
    });
    nav.insertBefore(btn,weekTab||calTab||null);
  });
}

/* ══ THEME ══ */
function applyTheme(){
  if(S.theme!=='dark') S.theme='light';
  document.documentElement.setAttribute('data-theme',S.theme);
  const ti=document.getElementById('toolTheme');
  if(ti) ti.textContent=S.theme==='dark'?'☀️ Light mode':'🌙 Dark mode';
}
applyTheme();

/* ══ TOOLS DROPDOWN ══ */
document.getElementById('toolsBtn').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('toolsMenu').classList.toggle('open');
});
document.addEventListener('click',()=>document.getElementById('toolsMenu')?.classList.remove('open'));

document.getElementById('toolTheme').addEventListener('click',()=>{
  S.theme=S.theme==='light'?'dark':'light';
  applyTheme(); save();
  document.getElementById('toolsMenu').classList.remove('open');
});
document.getElementById('toolLang').addEventListener('click',()=>{
  document.getElementById('toolsMenu').classList.remove('open');
  // highlight current lang
  document.querySelectorAll('.lang-opt').forEach(btn=>{
    const sel=btn.dataset.lang===S.lang;
    btn.style.borderColor=sel?'var(--accent)':'var(--border)';
    btn.style.background=sel?'var(--accent-soft)':'var(--surface)';
  });
  document.getElementById('langOverlay').style.display='flex';
});
document.querySelectorAll('.lang-opt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    S.lang=btn.dataset.lang; save();
    document.getElementById('langOverlay').style.display='none';
    applyTranslations(); render();
    toast(S.lang==='fr'?'🇫🇷 Interface en français':'🇬🇧 Interface in English');
  });
});
document.getElementById('langClose').addEventListener('click',()=>{document.getElementById('langOverlay').style.display='none';});
document.getElementById('langOverlay').addEventListener('click',e=>{if(e.target.id==='langOverlay')document.getElementById('langOverlay').style.display='none';});
document.getElementById('toolPdf').addEventListener('click',()=>{
  window.print();
  document.getElementById('toolsMenu').classList.remove('open');
});
document.getElementById('toolSpaces').addEventListener('click',()=>{
  S.tab='workspaces';
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('toolsMenu').classList.remove('open');
  render();
});
document.getElementById('toolPomodoro').addEventListener('click',()=>{
  document.getElementById('toolsMenu').classList.remove('open');
  openPomodoro();
});

/* ══ LOGO → DASHBOARD ══ */
document.getElementById('logoBtn').addEventListener('click',()=>{
  S.tab='dashboard'; S.inlineOpen=null; S.quickMeeting=null;
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-tab="dashboard"]')?.classList.add('active');
  render();
});

/* ══ APPLY TRANSLATIONS ══ */
function applyTranslations(){
  document.querySelectorAll('.nav-tab:not([data-ws])').forEach(tab=>{
    const key=tab.dataset.tab;
    if(key&&(T.en[key]||T.fr[key])) tab.textContent=t(key);
  });
  const toolMap={
    toolPomodoro:`🍅 ${t('pomodoro')}`,
    toolSpaces:`🗂 ${t('manageSpaces')}`,
    toolBackup:`💾 ${t('backups')}`,
    toolPdf:`⬇ ${t('exportPdf')}`,
    toolTheme:S.theme==='dark'?`☀️ ${t('lightMode')}`:`🌙 ${t('darkMode')}`,
  };
  Object.entries(toolMap).forEach(([id,lbl])=>{const el=document.getElementById(id);if(el)el.textContent=lbl;});
}

/* ══ TABS ══ */
function initTabs(){
  document.querySelectorAll('.nav-tab:not([data-ws])').forEach(t=>{
    t.addEventListener('click',()=>{
      S.tab=t.dataset.tab; S.inlineOpen=null; S.quickMeeting=null;
      document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active'); render();
    });
  });
  rebuildNav();
  // restore active tab highlight
  document.querySelectorAll('.nav-tab').forEach(t=>{
    if(t.dataset.tab===S.tab) t.classList.add('active');
    else t.classList.remove('active');
  });
}

/* ══ UTILS ══ */
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function p2(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function dateFromStr(s){return s?new Date(s+' 00:00'):null;}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return `${parseInt(d)} ${SMON[parseInt(m)-1]} ${y}`;}
function addDays(s,n){const d=new Date(s+' 00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function addMonths(s,n){const d=new Date(s+' 00:00');d.setMonth(d.getMonth()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function isOv(due,done){if(!due||done)return false;const t=new Date();t.setHours(0,0,0,0);return new Date(due+' 00:00')<t;}
function stripHtml(s){if(!s)return'';return s.replace(/<br\s*\/?>/gi,' ').replace(/<li>/gi,'• ').replace(/<\/li>/gi,' ').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();}
function getLabelColor(id){return COLOR_LABELS.find(c=>c.id===id)?.color||'';}

/* ══ TOAST ══ */
function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');

}

/* ══ CLOUD SYNC ══ */
function syncStatus(cls){const btn=document.getElementById('syncBtn');if(!btn)return;btn.className='btn-sync '+(cls||'');}

function updateSyncLabel(){
  const ts=localStorage.getItem('aztodo_last_sync');
  const label=document.getElementById('lastSyncLabel');
  const dateEl=document.getElementById('lastSyncDate');
  const timeEl=document.getElementById('lastSyncTime');
  if(!label||!ts)return;
  const d=new Date(ts);
  const dateStr=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const timeStr=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  dateEl.textContent=`Last sync · ${dateStr}`;
  timeEl.textContent=timeStr;
  label.style.display='flex';
}

async function cloudPush(){
  syncStatus('syncing');
  try{
    const r=await fetch('/api/sync',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({todos:S.todos,meetings:S.meetings,theme:S.theme,filter:S.filter,workspaces:S.workspaces})});
    if(!r.ok)throw new Error(r.status);
    const now=new Date().toISOString();
    localStorage.setItem('aztodo_last_sync',now);
    updateSyncLabel();
    syncStatus('ok'); toast('✓ Synced');
  }catch(e){syncStatus('');} // silent fail when running locally
}
async function cloudPull(){
  syncStatus('syncing');
  try{
    const r=await fetch('/api/sync');
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();

    // SAFETY: never overwrite local data with empty or smaller cloud data
    const cloudTodos=d.todos||[];
    const cloudMeetings=d.meetings||[];
    const localTodos=S.todos||[];
    const localMeetings=S.meetings||[];

    if(cloudTodos.length===0&&localTodos.length>0){
      // Cloud is empty but we have local data → push local up instead
      syncStatus('');
      await cloudPush();
      toast('↑ Local data pushed to cloud (cloud was empty)');
      return;
    }
    if(cloudTodos.length<localTodos.length*0.5&&localTodos.length>3){
      // Cloud has less than half our local tasks — something went wrong, keep local
      syncStatus('err');
      toast('⚠ Cloud has fewer tasks than local — keeping local data safe');
      return;
    }

    // Safe to apply cloud data
    if(cloudTodos.length>0) S.todos=cloudTodos;
    if(cloudMeetings.length>0) S.meetings=cloudMeetings;
    if(d.theme) S.theme=d.theme;
    if(d.filter) S.filter=d.filter;
    if(d.workspaces&&d.workspaces.length>0) S.workspaces=d.workspaces;
    S.todos.forEach(t=>{if(!t.subtasks)t.subtasks=[];if(!t.label)t.label='';if(!t.recur)t.recur='';});
    const now=new Date().toISOString();
    localStorage.setItem('aztodo_last_sync',now);
    updateSyncLabel();
    save(); syncStatus('ok'); applyTheme(); render();
  }catch(e){syncStatus('');}
}
window.addEventListener('load',()=>cloudPull());
document.getElementById('syncBtn').addEventListener('click',()=>cloudPush());

// Also push when user leaves the page
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden') cloudPush();});

/* ══ WEEKLY BACKUP SYSTEM ══ */
const BACKUP_PREFIX='aztodo_backup_';
const MAX_BACKUPS=4;

function saveBackup(label){
  const date=label||todayStr();
  const key=BACKUP_PREFIX+date;
  const snap={
    date, savedAt:new Date().toISOString(),
    todos:S.todos, meetings:S.meetings,
    workspaces:S.workspaces, taskCount:S.todos.length
  };
  localStorage.setItem(key,JSON.stringify(snap));
  // Prune old backups — keep only MAX_BACKUPS
  const keys=getAllBackupKeys().sort();
  while(keys.length>MAX_BACKUPS){
    localStorage.removeItem(keys.shift());
    keys.shift(); // re-read after removal
  }
  // Re-prune properly
  const allKeys=getAllBackupKeys().sort();
  if(allKeys.length>MAX_BACKUPS){
    allKeys.slice(0,allKeys.length-MAX_BACKUPS).forEach(k=>localStorage.removeItem(k));
  }
}

function getAllBackupKeys(){
  return Object.keys(localStorage).filter(k=>k.startsWith(BACKUP_PREFIX)).sort();
}

function getBackups(){
  return getAllBackupKeys().reverse().map(k=>{
    try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}
  }).filter(Boolean);
}

function checkWeeklyBackup(){
  const keys=getAllBackupKeys().sort();
  const lastKey=keys[keys.length-1]||'';
  const lastDate=lastKey.replace(BACKUP_PREFIX,'');
  const daysSince=lastDate?Math.floor((Date.now()-new Date(lastDate))/86400000):999;
  if(daysSince>=7||!lastDate){
    saveBackup(todayStr());
  }
}

function openBackupModal(){
  const overlay=document.getElementById('backupOverlay');
  overlay.style.display='flex';
  renderBackupList();
}

function renderBackupList(){
  const list=document.getElementById('backupList');
  const backups=getBackups();
  if(!backups.length){
    list.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:12px 0;">${t('noBackups')}</div>`;
    return;
  }
  list.innerHTML=backups.map((b,i)=>`
    <div style="background:var(--surface2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${fmtDate(b.date)} ${i===0?`<span style="font-size:10px;background:var(--success-soft);color:var(--success);padding:1px 7px;border-radius:10px;font-weight:700;">${t('latestBackup')}</span>`:''}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">${b.taskCount} tasks · ${new Date(b.savedAt).toLocaleString()}</div>
      </div>
      <button data-bdate="${b.date}" class="restore-btn" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">${t('restore')}</button>
    </div>
  `).join('');
  list.querySelectorAll('.restore-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const date=btn.dataset.bdate;
      if(!confirm(`Restore backup from ${fmtDate(date)}? This will replace your current ${S.todos.length} tasks with ${getBackups().find(b=>b.date===date)?.taskCount} tasks from that backup.`))return;
      const snap=getBackups().find(b=>b.date===date);
      if(!snap)return;
      // Save current state as emergency backup before restoring
      saveBackup('pre-restore-'+todayStr());
      S.todos=snap.todos||[];
      S.meetings=snap.meetings||[];
      if(snap.workspaces?.length) S.workspaces=snap.workspaces;
      save();
      SECS=getSECS(); rebuildNav();
      document.getElementById('backupOverlay').style.display='none';
      render();
      toast(`✓ Restored ${S.todos.length} tasks from ${fmtDate(date)}`);
    });
  });
}

document.getElementById('backupNowBtn').addEventListener('click',()=>{
  saveBackup(todayStr());
  renderBackupList();
  toast(`💾 ${t('backups').split('&')[0].trim()}`);
});

/* ══ NOTIFICATIONS ══ */
let notifEnabled=localStorage.getItem('aztodo_notif')==='true';
function checkNotifBar(){
  if(notifEnabled||Notification.permission==='granted'||Notification.permission==='denied')return;
  document.getElementById('notifBar').style.display='block';
}
document.getElementById('notifAllow')?.addEventListener('click',async()=>{
  const p=await Notification.requestPermission();
  if(p==='granted'){notifEnabled=true;localStorage.setItem('aztodo_notif','true');toast('✓ Notifications enabled');}
  document.getElementById('notifBar').style.display='none';
});
document.getElementById('notifDismiss')?.addEventListener('click',()=>{
  document.getElementById('notifBar').style.display='none';
});
function scheduleNotifs(){
  if(Notification.permission!=='granted')return;
  const now=new Date();
  const today=todayStr();
  // meetings today — notify 15 min before
  S.meetings.filter(m=>m.date===today&&m.time).forEach(m=>{
    const[hh,mm]=m.time.split(':').map(Number);
    const mtgTime=new Date();
    mtgTime.setHours(hh,mm,0,0);
    const diff=mtgTime-now-15*60*1000;
    if(diff>0&&diff<8*60*60*1000){
      setTimeout(()=>new Notification('AZ Todo — Meeting in 15 min',{body:m.title,icon:'/favicon.ico'}),diff);
    }
  });
  // tasks due today
  S.todos.filter(t=>!t.done&&t.due===today).forEach(t=>{
    const notifAt=new Date();
    notifAt.setHours(9,0,0,0);
    const diff2=notifAt-now;
    if(diff2>0&&diff2<2*60*60*1000){
      setTimeout(()=>new Notification('AZ Todo — Due today',{body:t.text}),diff2);
    }
  });
}
window.addEventListener('load',()=>{
  checkNotifBar();
  if(Notification.permission==='granted')scheduleNotifs();
});

/* ══ RECURRING TASK SPAWNER ══ */
function spawnRecurring(){
  const today=todayStr();
  const newTasks=[];
  S.todos.filter(t=>t.recur&&t.due&&!t.done).forEach(t=>{
    if(t.due<today){
      let next=t.due;
      while(next<today){
        if(t.recur==='daily') next=addDays(next,1);
        else if(t.recur==='weekly') next=addDays(next,7);
        else if(t.recur==='monthly') next=addMonths(next,1);
        else break;
      }
      if(next!==t.due&&!S.todos.find(x=>x.text===t.text&&x.due===next&&x.section===t.section)){
        newTasks.push({...t,id:uid(),due:next,done:false,subtasks:t.subtasks.map(s=>({...s,done:false})),created:new Date().toISOString()});
      }
    }
  });
  if(newTasks.length){S.todos.push(...newTasks);save();}
}
spawnRecurring();

/* ══ POMODORO ══ */
const POMO_MODES={work:25*60,short:5*60,long:15*60};
let pomoState={mode:'work',remaining:25*60,running:false,interval:null,sessions:parseInt(localStorage.getItem('aztodo_pomo_sessions_'+todayStr())||'0')};
const CIRC=2*Math.PI*70; // 439.8

function openPomodoro(){
  const sel=document.getElementById('pomoTaskSelect');
  sel.innerHTML=`<option value="">${t('noTask')}</option>`+
    S.todos.filter(td=>!td.done).map(td=>`<option value="${td.id}">${esc(td.text.slice(0,50))}</option>`).join('');
  updatePomoDisplay();
  updatePomoSessions();
  document.getElementById('pomoOverlay').style.display='flex';
}
function closePomodoro(){document.getElementById('pomoOverlay').style.display='none';}
document.getElementById('pomoClose').addEventListener('click',closePomodoro);
document.getElementById('pomoOverlay').addEventListener('click',e=>{if(e.target.id==='pomoOverlay')closePomodoro();});

function updatePomoDisplay(){
  const m=Math.floor(pomoState.remaining/60);
  const s=pomoState.remaining%60;
  document.getElementById('pomoTime').textContent=`${p2(m)}:${p2(s)}`;
  // ring
  const frac=pomoState.remaining/POMO_MODES[pomoState.mode];
  document.getElementById('pomoCircle').style.strokeDashoffset=CIRC*(1-frac);
  // color by mode
  const colors={work:'var(--accent)',short:'var(--success)',long:'var(--purple)'};
  document.getElementById('pomoCircle').style.stroke=colors[pomoState.mode];
  // play button
  document.getElementById('pomoPlay').textContent=pomoState.running?'⏸':'▶';
}
function updatePomoSessions(){
  document.getElementById('pomoSessions').textContent=`${t('sessionToday')}: ${pomoState.sessions}`;
}

document.querySelectorAll('.pomo-mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    pomoStop();
    pomoState.mode=btn.dataset.pmode;
    pomoState.remaining=POMO_MODES[pomoState.mode];
    document.querySelectorAll('.pomo-mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    updatePomoDisplay();
  });
});

document.getElementById('pomoPlay').addEventListener('click',()=>{
  if(pomoState.running) pomoStop();
  else pomoStart();
});
document.getElementById('pomoReset').addEventListener('click',()=>{
  pomoStop();
  pomoState.remaining=POMO_MODES[pomoState.mode];
  updatePomoDisplay();
});

function pomoStart(){
  pomoState.running=true;
  updatePomoDisplay();
  pomoState.interval=setInterval(()=>{
    pomoState.remaining--;
    updatePomoDisplay();
    if(pomoState.remaining<=0){
      pomoStop();
      if(pomoState.mode==='work'){
        pomoState.sessions++;
        localStorage.setItem('aztodo_pomo_sessions_'+todayStr(),pomoState.sessions);
        updatePomoSessions();
        if(Notification.permission==='granted') new Notification('🍅 Pomodoro done!',{body:'Time for a break!'});
        toast('🍅 Pomodoro complete! Take a break.');
      } else {
        if(Notification.permission==='granted') new Notification('⏰ Break over!',{body:'Back to work!'});
        toast('Break over — back to focus!');
      }
    }
  },1000);
}
function pomoStop(){
  clearInterval(pomoState.interval);
  pomoState.running=false;
  updatePomoDisplay();
}

/* ══ RENDER ══ */
function render(){
  closeCtx(); closeMiniCal();
  const ca=document.getElementById('contentArea');
  ca.classList.remove('week-view','all-view','single-ws');
  if(S.tab==='calendar') renderCalendar(ca);
  else if(S.tab==='dashboard') renderDashboard(ca);
  else if(S.tab==='week') renderWeek(ca);
  else if(S.tab==='workspaces') renderWorkspaces(ca);
  else if(S.tab==='all'){ca.classList.add('all-view');renderTodos(ca);}
  else {
    const ws=(S.workspaces||[]).find(w=>w.id===S.tab);
    if(ws){ca.classList.add('single-ws');renderTodos(ca);}
    else renderDashboard(ca);
  }
}

function integrationLog(key,msg){

  INTEGRATION_STATE[key].log.unshift(`[${ts}] ${msg}`);

function updateIntegrationUI(key){
  const st=INTEGRATION_STATE[key];
  const statusEl=document.getElementById(`int-status-${key}`);

  const btnEl=document.getElementById(`int-btn-${key}`);

/* ── GMAIL SYNC ── */
async function syncGmail(){
  INTEGRATION_STATE.gmail.status='loading';
  updateIntegrationUI('gmail');
  integrationLog('gmail','Claude is reading and assessing your emails…');
  updateIntegrationUI('gmail');

  try{
    const existingTasks=S.todos.filter(t=>t.source==='gmail').map(t=>t.text);
    const r=await fetch('/api/gmail',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({workspaces:S.workspaces||[],existingTasks})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error||r.status);}
    const {tasks=[],infos=[]}=await r.json();

    // store infos for dashboard display
    INTEGRATION_STATE.gmail.infos=infos;

    if(!tasks.length&&!infos.length){
      integrationLog('gmail','No actionable emails or updates found.');
      INTEGRATION_STATE.gmail.status='ok';
      INTEGRATION_STATE.gmail.lastSync=new Date();
      updateIntegrationUI('gmail');
      render();return;
    }

    let added=0;
    tasks.forEach(task=>{
      if(!task.text)return;
      if(S.todos.find(t=>t.text===task.text))return;
      S.todos.push({
        id:uid(),text:task.text,
        section:task.section||(S.workspaces[0]?.id||'perso'),
        priority:task.priority||'medium',
        due:task.due||null,note:task.note||'',
        link:'',label:'',recur:'',subtasks:[],
        source:'gmail',done:false,created:new Date().toISOString()
      });
      added++;
    });

    save();
    const msg=`✓ ${added} task${added!==1?'s':''} created, ${infos.length} info item${infos.length!==1?'s':''} from Gmail.`;
    integrationLog('gmail',msg);
    INTEGRATION_STATE.gmail.status='ok';
    INTEGRATION_STATE.gmail.lastSync=new Date();
    updateIntegrationUI('gmail');
    toast(`📧 ${msg}`);
    render();
  }catch(err){
    integrationLog('gmail',`Error: ${err.message}`);
    INTEGRATION_STATE.gmail.status='err';
    updateIntegrationUI('gmail');
  }
}

/* ── GOOGLE CALENDAR SYNC ── */
async function syncGCal(){
  INTEGRATION_STATE.gcal.status='loading';
  updateIntegrationUI('gcal');
  integrationLog('gcal',`Fetching calendar events for ${GCAL_EMAIL}…`);
  updateIntegrationUI('gcal');

  try{
    // Always sync today → today+30 days
    const today=todayStr();
    const in30=addDays(today,30);

    const r=await fetch('/api/gcal',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({workspaces:S.workspaces||[],email:GCAL_EMAIL,dateFrom:today,dateTo:in30})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error||r.status);}
    const {events=[]}=await r.json();

    // Build set of gcalIds returned by Google
    const returnedIds=new Set(events.map(ev=>ev.gcalId).filter(Boolean));

    // ── DELETE meetings that were removed in Google Calendar ──
    // Only delete gcal-sourced meetings within the sync window (today → +30 days)
    const beforeCount=S.meetings.length;
    S.meetings=S.meetings.filter(m=>{
      if(!m.gcalId) return true;          // manually created — keep always
      if(m.date<today||m.date>in30) return true; // outside sync window — keep
      return returnedIds.has(m.gcalId);  // keep only if still in Google Calendar
    });
    const deleted=beforeCount-S.meetings.length;

    // ── ADD / UPDATE returned events ──
    let added=0,updated=0;
    events.forEach(ev=>{
      if(!ev.title||!ev.date)return;
      const existing=S.meetings.find(m=>m.gcalId&&m.gcalId===ev.gcalId);
      if(existing){
        existing.title=ev.title;
        existing.date=ev.date;
        existing.time=ev.time||'';
        existing.notes=ev.notes||'';
        existing.section=ev.section||existing.section;
        updated++;
      }else{
        S.meetings.push({
          id:uid(),title:ev.title,date:ev.date,
          time:ev.time||'',
          section:ev.section||(S.workspaces[0]?.id||'perso'),
          notes:ev.notes||'',
          gcalId:ev.gcalId||''
        });
        added++;
      }
    });

    save();
    const parts=[];
    if(added)   parts.push(`${added} ajouté${added>1?'s':''}`);
    if(updated) parts.push(`${updated} mis à jour`);
    if(deleted) parts.push(`${deleted} supprimé${deleted>1?'s':''}`);
    const msg=parts.length?parts.join(', '):'Aucun changement';
    integrationLog('gcal',`✓ ${msg} · Fenêtre: ${fmtDate(today)} → ${fmtDate(in30)}`);
    INTEGRATION_STATE.gcal.status='ok';
    INTEGRATION_STATE.gcal.lastSync=new Date();
    updateIntegrationUI('gcal');
    toast(`📅 Google Calendar: ${msg}`);
    render();

  }catch(err){
    integrationLog('gcal',`Error: ${err.message}`);
    INTEGRATION_STATE.gcal.status='err';
    updateIntegrationUI('gcal');
  }
}

          <td><div class="lv-text" style="display:flex;align-items:center;gap:6px;">${lc?`<span class="clabel" style="background:${lc};flex-shrink:0;"></span>`:''}<span>${esc(t.text)}</span>${t.source==='gmail'?`<span style="font-size:9px;font-weight:700;padding:0 4px;border-radius:3px;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;flex-shrink:0;">Gmail</span>`:''}</div></td>
          ${!isSingle?`<td><span class="tag ${info.tag}" style="font-size:10px;padding:1px 6px;">${info.label}</span></td>`:''}
          <td style="font-size:12px;color:${ov?'var(--danger)':'var(--text3)'};white-space:nowrap;">${t.due?fmtDate(t.due):'—'}</td>
          <td><span class="pri-badge pri-badge-${pri}" style="font-size:10px;">${cap(pri)}</span></td>
          <td style="text-align:right;"><button class="lv-edit-btn" data-id="${t.id}" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;" onclick="event.stopPropagation()">✎</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}
